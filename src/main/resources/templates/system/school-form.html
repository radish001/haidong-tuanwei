<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="drawer-content-view" th:fragment="drawerContent">
    <div class="drawer-panel-header">
        <h2 class="h4 mb-1" th:text="${formTitle}">新增学校</h2>
    </div>
    <div class="alert error-alert" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <form th:action="@{${formAction}}" th:object="${schoolForm}" method="post" class="edit-form row g-3" novalidate>
        <div class="alert error-alert validation-error-banner col-12" th:if="${#fields.hasAnyErrors()}">请检查并填写所有必填项</div>
        <label class="col-12 col-md-6"><span>学校编码</span><input class="form-control" type="text" th:field="*{schoolCode}" required></label>
        <label class="col-12 col-md-6"><span>学校名称</span><input class="form-control" type="text" th:field="*{schoolName}" required></label>
        <label class="col-12 col-md-6">
            <span>学校类别</span>
            <select class="form-select" th:field="*{categoryDictItemId}" required>
                <option value="">请选择</option>
                <option th:each="item : ${schoolCategories}" th:value="${item.id}" th:text="${item.dictLabel}"></option>
            </select>
        </label>
        <label class="full-width job-multiselect-label col-12">
            <span>学校标签</span>
            <select class="form-select" th:field="*{tagIds}" multiple data-multiselect data-placeholder="请选择学校标签">
                <option th:each="item : ${schoolTags}" th:value="${item.id}" th:text="${item.tagName}"></option>
            </select>
        </label>
        <div class="form-actions full-width col-12">
            <a class="btn btn-outline-secondary" th:href="@{/system/dictionaries(tab='school')}" data-drawer-close>取消</a>
            <button type="submit" class="btn btn-primary">保存</button>
        </div>
    </form>
</section>
</body>
</html>
