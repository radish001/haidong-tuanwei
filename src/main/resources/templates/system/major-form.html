<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="drawer-content-view" th:fragment="drawerContent">
    <div class="drawer-panel-header">
        <h2 class="h4 mb-1" th:text="${formTitle}">新增专业名称</h2>
    </div>
    <div class="alert error-alert" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <form th:action="@{${formAction}}" th:object="${majorForm}" method="post" class="edit-form row g-3" novalidate>
        <div class="alert error-alert validation-error-banner col-12" th:if="${#fields.hasAnyErrors()}">请检查并填写所有必填项</div>
        <label class="col-12 col-md-6"><span>专业编码</span><input class="form-control" type="text" th:field="*{majorCode}" required></label>
        <label class="col-12 col-md-6"><span>专业名称</span><input class="form-control" type="text" th:field="*{majorName}" required></label>
        <label class="col-12 col-md-6">
            <span>专业类别</span>
            <select class="form-select" th:field="*{categoryDictItemId}" required>
                <option value="">请选择</option>
                <option th:each="item : ${majorCategories}" th:value="${item.id}" th:text="${item.dictLabel}"></option>
            </select>
        </label>
        <div class="form-actions full-width col-12">
            <a class="btn btn-outline-secondary" th:href="@{/system/dictionaries(tab='major')}" data-drawer-close>取消</a>
            <button type="submit" class="btn btn-primary">保存</button>
        </div>
    </form>
</section>
</body>
</html>
