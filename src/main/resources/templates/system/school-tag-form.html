<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="drawer-content-view" th:fragment="drawerContent">
    <div class="drawer-panel-header d-flex flex-wrap justify-content-between align-items-start gap-3">
        <div>
            <h2 class="h4 mb-1" th:text="${formTitle}">新增学校标签</h2>
            <p class="text-secondary mb-0">学校标签用于双一流等附加属性管理。</p>
        </div>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/system/dictionaries(tab='school-category', section='school-tag')}" data-drawer-close aria-label="关闭">
            <i class="bi bi-x-lg" aria-hidden="true"></i>
        </a>
    </div>
    <div class="alert error-alert" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <form th:action="@{${formAction}}" th:object="${schoolTagForm}" method="post" class="edit-form row g-3">
        <label class="full-width col-12"><span>标签名称</span><input class="form-control" type="text" th:field="*{tagName}"></label>
        <div class="form-actions full-width col-12">
            <a class="btn btn-outline-secondary" th:href="@{/system/dictionaries(tab='school-category', section='school-tag')}" data-drawer-close>取消</a>
            <button type="submit" class="btn btn-primary">保存</button>
        </div>
    </form>
</section>
</body>
</html>
