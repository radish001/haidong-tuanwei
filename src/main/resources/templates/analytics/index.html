<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青年信息库</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body class="admin-body">
<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content container-fluid">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle})}"></div>
        <section class="analytics-page-panel card border-0 shadow-sm">
            <div class="workbench-tabs">
                <ul class="nav nav-tabs border-0 gap-2">
                    <li class="nav-item">
                        <a class="nav-link"
                           th:classappend="${!analyticsTab} ? ' active' : ''"
                           th:href="@{/youth/{type}(type=${youthType})}">在校大学生</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link"
                           th:classappend="${analyticsTab} ? ' active' : ''"
                           th:href="@{/youth/{type}/analytics(type=${youthType})}">数据分析</a>
                    </li>
                </ul>
            </div>
            <div class="workbench-heading">
                <div>
                    <h2 th:text="${isCollegeAnalytics ? '在校大学生分析看板' : '统计分析看板'}">在校大学生分析看板</h2>
                </div>
            </div>
            <div th:if="${isCollegeAnalytics}">
                <div class="analytics-grid-3col">
                    <div class="card border-0"><div id="schoolCategoryChart" class="chart-box"></div></div>
                    <div class="card border-0"><div id="educationChart" class="chart-box"></div></div>
                    <div class="card border-0"><div id="ethnicityChart" class="chart-box"></div></div>
                    <div class="card border-0"><div id="genderChart" class="chart-box"></div></div>
                    <div class="card border-0 span-2"><div id="majorCategoryChart" class="chart-box tall"></div></div>
                </div>
                <section class="analytics-topic-panel">
                    <div class="analytics-topic-header">
                        <div>
                            <h3>海东籍顶尖高校分析</h3>
                        </div>
                    </div>
                    <div id="haidongTagCharts" class="tag-chart-grid"></div>
                </section>
                <section class="analytics-topic-panel">
                    <div class="analytics-topic-header">
                        <div>
                            <h3>招聘信息专业分析</h3>
                        </div>
                    </div>
                    <div class="card border-0"><div id="jobMajorChart" class="chart-box"></div></div>
                </section>
            </div>
            <div th:unless="${isCollegeAnalytics}" class="analytics-grid row g-4">
                <div class="col-12 col-md-6 col-lg-4"><div class="card h-100 border-0"><div id="ageChart" class="chart-box tall"></div></div></div>
                <div class="col-12 col-md-6 col-lg-4"><div class="card h-100 border-0"><div id="educationChart" class="chart-box tall"></div></div></div>
                <div class="col-12 col-md-6 col-lg-4"><div class="card h-100 border-0"><div id="ethnicityChart" class="chart-box"></div></div></div>
                <div class="col-12 col-md-6 col-lg-4"><div class="card h-100 border-0"><div id="politicalChart" class="chart-box"></div></div></div>
                <div class="col-12 col-md-6 col-lg-4"><div class="card h-100 border-0"><div id="genderChart" class="chart-box"></div></div></div>
                <div class="col-12"><div class="card h-100 border-0"><div id="demandChart" class="chart-box"></div></div></div>
            </div>
        </section>
    </main>
</div>
<script th:inline="javascript">
    const isCollegeAnalytics = /*[[${isCollegeAnalytics}]]*/ false;
    const ageData = /*[[${ageDistributionJson}]]*/ '[]';
    const schoolCategoryData = /*[[${schoolCategoryDistributionJson}]]*/ '[]';
    const majorCategoryData = /*[[${majorCategoryDistributionJson}]]*/ '[]';
    const jobMajorData = /*[[${jobMajorDistributionJson}]]*/ '[]';
    const genderData = /*[[${genderDistributionJson}]]*/ '[]';
    const educationData = /*[[${educationDistributionJson}]]*/ '[]';
    const ethnicityData = /*[[${ethnicityDistributionJson}]]*/ '[]';
    const politicalData = /*[[${politicalStatusDistributionJson}]]*/ '[]';
    const demandData = /*[[${entrepreneurshipDemandDistributionJson}]]*/ '[]';
    const haidongTagData = /*[[${haidongSchoolTagDistributionJson}]]*/ '[]';

    function parseData(raw) {
        return JSON.parse(raw || '[]');
    }

    function baseOption(title) {
        return {
            title: {
                text: title,
                left: 'center',
                top: 10,
                textStyle: {color: '#e7f0ff', fontSize: 16, fontWeight: 700}
            },
            tooltip: {trigger: 'item'},
            textStyle: {color: '#8ea3cc'}
        };
    }

    function noDataOption(title) {
        return Object.assign(baseOption(title), {
            graphic: {
                type: 'text',
                left: 'center',
                top: 'middle',
                style: {
                    text: '暂无数据',
                    fontSize: 14,
                    fill: 'rgba(142, 163, 204, 0.5)',
                    fontWeight: 400
                }
            }
        });
    }

    function formatIntegerTick(value) {
        return Math.round(Number(value) || 0).toLocaleString('en-US');
    }

    function integerValueAxis(extra = {}) {
        return Object.assign({
            type: 'value',
            minInterval: 1,
            axisLabel: {
                color: '#8ea3cc',
                formatter(value) {
                    return formatIntegerTick(value);
                }
            },
            splitLine: {lineStyle: {color: 'rgba(255,255,255,0.06)'}}
        }, extra);
    }

    function hasData(data) {
        return data.length > 0 && data.some(item => item.value > 0);
    }

    function initChart(elementId, title, data) {
        const chart = echarts.init(document.getElementById(elementId));
        if (!hasData(data)) {
            chart.setOption(noDataOption(title));
            window.addEventListener('resize', () => chart.resize());
            return null;
        }
        return chart;
    }

    function attachResize(chart) {
        window.addEventListener('resize', () => chart.resize());
    }

    function renderAreaChart(elementId, title, rawData) {
        const data = parseData(rawData);
        const chart = initChart(elementId, title, data);
        if (!chart) return;
        chart.setOption(Object.assign(baseOption(title), {
            tooltip: {trigger: 'axis'},
            grid: {left: 50, right: 24, top: 60, bottom: 40},
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: data.map(item => item.name),
                axisLabel: {color: '#8ea3cc'}
            },
            yAxis: integerValueAxis(),
            series: [{
                type: 'line',
                smooth: true,
                data: data.map(item => item.value),
                symbol: 'circle',
                symbolSize: 8,
                lineStyle: {width: 3, color: '#4bc8ff'},
                itemStyle: {color: '#8ef3ff'},
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        {offset: 0, color: 'rgba(74, 234, 255, 0.65)'},
                        {offset: 1, color: 'rgba(24, 107, 255, 0.06)'}
                    ])
                }
            }]
        }));
        attachResize(chart);
    }

    function renderHorizontalBar(elementId, title, rawData, clickFilterParam) {
        const data = parseData(rawData);
        const chart = initChart(elementId, title, data);
        if (!chart) return;
        if (clickFilterParam) document.getElementById(elementId).style.cursor = 'pointer';
        chart.setOption(Object.assign(baseOption(title), {
            tooltip: {trigger: 'axis', axisPointer: {type: 'shadow'}},
            grid: {left: 70, right: 24, top: 60, bottom: 30},
            xAxis: integerValueAxis(),
            yAxis: {
                type: 'category',
                data: data.map(item => item.name),
                axisLabel: {color: '#8ea3cc'}
            },
            series: [{
                type: 'bar',
                data: data.map(item => ({value: item.value, code: item.code})),
                itemStyle: {
                    color: new echarts.graphic.LinearGradient(1, 0, 0, 0, [
                        {offset: 0, color: '#6be6ff'},
                        {offset: 1, color: '#2d7fff'}
                    ]),
                    borderRadius: [0, 8, 8, 0]
                },
                barMaxWidth: 18
            }]
        }));
        if (clickFilterParam) {
            chart.on('click', function(params) {
                var code = params.data && params.data.code;
                if (code) window.location.href = '/youth/college?' + clickFilterParam + '=' + encodeURIComponent(code);
            });
        }
        attachResize(chart);
    }

    function renderVerticalBar(elementId, title, rawData, clickFilterParam) {
        const data = parseData(rawData);
        const chart = initChart(elementId, title, data);
        if (!chart) return;
        if (clickFilterParam) document.getElementById(elementId).style.cursor = 'pointer';
        chart.setOption(Object.assign(baseOption(title), {
            tooltip: {trigger: 'axis', axisPointer: {type: 'shadow'}},
            grid: {left: 80, right: 24, top: 60, bottom: 70},
            xAxis: {
                type: 'category',
                data: data.map(item => item.name),
                axisLabel: {
                    color: '#8ea3cc',
                    interval: 0,
                    rotate: 35
                }
            },
            yAxis: integerValueAxis(),
            series: [{
                type: 'bar',
                data: data.map(item => ({value: item.value, code: item.code})),
                itemStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        {offset: 0, color: '#7be7ff'},
                        {offset: 1, color: '#2d7fff'}
                    ]),
                    borderRadius: [8, 8, 0, 0]
                },
                barMaxWidth: 28
            }]
        }));
        if (clickFilterParam) {
            chart.on('click', function(params) {
                var code = params.data && params.data.code;
                if (code) window.location.href = '/youth/college?' + clickFilterParam + '=' + encodeURIComponent(code);
            });
        }
        attachResize(chart);
    }

    function topNWithOther(data, n) {
        if (data.length <= n) return data;
        const sorted = data.slice().sort((a, b) => b.value - a.value);
        const top = sorted.slice(0, n);
        const otherValue = sorted.slice(n).reduce((sum, item) => sum + item.value, 0);
        if (otherValue > 0) {
            top.push({name: '其他', value: otherValue});
        }
        return top;
    }

    function renderPieChart(elementId, title, rawData, donut, options = {}) {
        const data = topNWithOther(parseData(rawData), options.topN ?? 10);
        const chart = initChart(elementId, title, data);
        if (!chart) return;
        const seriesCenter = options.seriesCenter ?? ['50%', '50%'];
        const seriesRadius = options.seriesRadius ?? (donut ? ['36%', '58%'] : '58%');
        const titleTop = options.titleTop ?? 10;
        const clickFilterParam = options.clickFilterParam;
        const clickUrlBuilder = options.clickUrlBuilder;
        const colors = ['#4dc3ff', '#66e3b5', '#f9be59', '#f87171', '#8b9df8', '#60a5fa', '#34d399', '#f472b6', '#a78bfa', '#fbbf24', '#94a3b8'];
        if (clickFilterParam || clickUrlBuilder) document.getElementById(elementId).style.cursor = 'pointer';
        chart.setOption(Object.assign(baseOption(title), {
            title: {
                text: title,
                left: 'center',
                top: titleTop,
                textStyle: {color: '#e7f0ff', fontSize: 16, fontWeight: 700}
            },
            legend: {
                bottom: 0,
                left: 'center',
                textStyle: {color: '#8ea3cc', fontSize: 11},
                itemWidth: 10,
                itemHeight: 10,
                itemGap: 8
            },
            series: [{
                type: 'pie',
                radius: seriesRadius,
                center: seriesCenter,
                label: {show: false},
                labelLine: {show: false},
                itemStyle: {
                    borderColor: '#071738',
                    borderWidth: 4
                },
                data: data.map((item, index) => ({
                    name: item.name,
                    value: item.value,
                    code: item.code,
                    itemStyle: {
                        color: colors[index % colors.length]
                    }
                }))
            }]
        }));
        if (clickFilterParam || clickUrlBuilder) {
            chart.on('click', function(params) {
                var code = params.data && params.data.code;
                if (!code) {
                    return;
                }
                if (clickUrlBuilder) {
                    const url = clickUrlBuilder(code, params);
                    if (url) {
                        window.location.href = url;
                    }
                    return;
                }
                window.location.href = '/youth/college?' + clickFilterParam + '=' + encodeURIComponent(code);
            });
        }
        attachResize(chart);
    }

    function renderMirrorBar(elementId, title, rawData, clickFilterParam) {
        const data = parseData(rawData);
        const chart = initChart(elementId, title, data);
        if (!chart) return;
        if (clickFilterParam) document.getElementById(elementId).style.cursor = 'pointer';
        const categories = data.map(item => item.name);
        chart.setOption(Object.assign(baseOption(title), {
            tooltip: {
                trigger: 'axis',
                axisPointer: {type: 'shadow'},
                formatter(params) {
                    const rows = new Map();
                    params.forEach((item) => {
                        rows.set(item.name, `${item.name}：${Math.abs(item.value)}`);
                    });
                    return Array.from(rows.values()).join('<br>');
                }
            },
            grid: {left: 40, right: 30, top: 60, bottom: 40},
            xAxis: [
                {
                    type: 'value',
                    inverse: true,
                    position: 'top',
                    axisLabel: {show: false},
                    minInterval: 1,
                    splitLine: {lineStyle: {color: 'rgba(255,255,255,0.06)'}}
                },
                {
                    type: 'value',
                    position: 'bottom',
                    minInterval: 1,
                    axisLabel: {
                        color: '#8ea3cc',
                        formatter(value) {
                            return formatIntegerTick(Math.abs(value));
                        }
                    },
                    splitLine: {show: false}
                }
            ],
            yAxis: [
                {
                    type: 'category',
                    inverse: true,
                    data: categories,
                    axisLabel: {color: '#dce7ff', fontWeight: 600},
                    axisTick: {show: false},
                    axisLine: {show: false}
                },
                {
                    type: 'category',
                    inverse: true,
                    data: categories,
                    axisLabel: {show: false},
                    axisTick: {show: false},
                    axisLine: {show: false}
                },
                {
                    type: 'category',
                    inverse: true,
                    data: categories,
                    axisLabel: {show: false},
                    axisTick: {show: false},
                    axisLine: {show: false}
                }
            ],
            series: [
                {
                    type: 'bar',
                    xAxisIndex: 0,
                    yAxisIndex: 0,
                    data: data.map(item => ({value: -item.value, code: item.code})),
                    itemStyle: {color: '#4dc3ff', borderRadius: [8, 0, 0, 8]},
                    barMaxWidth: 22
                },
                {
                    type: 'bar',
                    xAxisIndex: 1,
                    yAxisIndex: 2,
                    data: data.map(item => ({value: item.value, code: item.code})),
                    itemStyle: {color: '#66e3b5', borderRadius: [0, 8, 8, 0]},
                    barMaxWidth: 22
                }
            ]
        }));
        if (clickFilterParam) {
            chart.on('click', function(params) {
                var code = params.data && params.data.code;
                if (code) window.location.href = '/youth/college?' + clickFilterParam + '=' + encodeURIComponent(code);
            });
        }
        attachResize(chart);
    }

    function renderTagCharts(containerId, rawData) {
        const container = document.getElementById(containerId);
        if (!container) {
            return;
        }
        container.querySelectorAll('.tag-chart-box').forEach(chartNode => {
            const instance = echarts.getInstanceByDom(chartNode);
            if (instance) {
                instance.dispose();
            }
        });
        const tagCharts = parseData(rawData);
        if (!tagCharts.length) {
            container.innerHTML = '<div class="tag-chart-empty">暂无学校标签专题数据</div>';
            return;
        }
        container.innerHTML = '';
        tagCharts.forEach((item, index) => {
            const panel = document.createElement('div');
            panel.className = 'card border-0 tag-chart-panel';
            const chartEl = document.createElement('div');
            chartEl.className = 'chart-box tag-chart-box';
            chartEl.id = `tagChart-${index}`;
            panel.appendChild(chartEl);
            container.appendChild(panel);
            const entries = topNWithOther(item.data || [], 10);
            const colorPalette = ['#4dc3ff', '#66e3b5', '#f9be59', '#f87171', '#8b9df8', '#60a5fa', '#34d399', '#f472b6', '#a78bfa', '#fbbf24', '#94a3b8'];
            requestAnimationFrame(() => {
                const chart = echarts.init(chartEl);
                chartEl.style.cursor = 'pointer';
                chart.setOption(Object.assign(baseOption(item.title), {
                    title: {
                        text: item.title,
                        left: 'center',
                        top: 18,
                        textStyle: {color: '#e7f0ff', fontSize: 16, fontWeight: 700}
                    },
                    tooltip: {
                        trigger: 'item',
                        formatter(params) {
                            return `${params.name}<br>海东籍学生：${params.value}人`;
                        }
                    },
                    legend: {
                        bottom: 0,
                        left: 'center',
                        textStyle: {color: '#8ea3cc', fontSize: 11},
                        itemWidth: 10,
                        itemHeight: 10,
                        itemGap: 8
                    },
                    series: [{
                        type: 'pie',
                        radius: ['36%', '58%'],
                        center: ['50%', '50%'],
                        minAngle: 5,
                        label: {show: false},
                        labelLine: {show: false},
                        itemStyle: {
                            borderColor: '#071738',
                            borderWidth: 4
                        },
                        data: entries.map((entry, entryIndex) => ({
                            name: entry.name,
                            value: entry.value,
                            code: entry.code,
                            itemStyle: {
                                color: colorPalette[entryIndex % colorPalette.length]
                            }
                        }))
                    }]
                }));
                chart.on('click', function(params) {
                    const code = params.data && params.data.code;
                    if (code) {
                        const query = new URLSearchParams({
                            schoolCode: code,
                            nativeProvinceCode: '630000',
                            nativeCityCode: '630200'
                        });
                        window.location.href = '/youth/college?' + query.toString();
                    }
                });
                chart.resize();
                attachResize(chart);
            });
        });
    }

    if (isCollegeAnalytics) {
        renderPieChart('schoolCategoryChart', '院校层次分布', schoolCategoryData, true, {clickFilterParam: 'schoolCategoryIds'});
        renderVerticalBar('majorCategoryChart', '专业类别分布', majorCategoryData, 'majorCategory');
        renderPieChart('ethnicityChart', '民族分类占比', ethnicityData, false, {clickFilterParam: 'ethnicity'});
        renderHorizontalBar('educationChart', '学历分布', educationData, 'educationLevel');
        renderMirrorBar('genderChart', '性别分布', genderData, 'gender');
        renderTagCharts('haidongTagCharts', haidongTagData);
        renderPieChart('jobMajorChart', '招聘信息专业分析', jobMajorData, true, {
            topN: 15,
            clickUrlBuilder(code) {
                return '/jobs?majorCodes=' + encodeURIComponent(code);
            }
        });
    } else {
    renderAreaChart('ageChart', '年龄结构', ageData);
    renderHorizontalBar('educationChart', '学历', educationData);
    renderPieChart('ethnicityChart', '民族分布', ethnicityData, false);
    renderPieChart('politicalChart', '政治面貌', politicalData, true);
    renderHorizontalBar('genderChart', '性别分布', genderData);
    renderPieChart('demandChart', '创业需求', demandData, true);
    }
</script>
</body>
</html>
