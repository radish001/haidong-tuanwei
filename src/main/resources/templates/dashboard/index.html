<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts/map/js/china.js"></script>
</head>
<body class="admin-body">
<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content container-fluid">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle})}"></div>

        <div class="workbench-actions justify-content-start ms-0">
            <a class="btn btn-outline-info" th:href="@{/analytics/college}">在校大学生分析</a>
        </div>

        <section class="map-grid row g-4">
            <div class="col-12 col-xl-6">
            <article class="map-card card border-0 h-100">
                <div class="map-card-header card-header bg-transparent border-0">
                    <div>
                        <h2>海东市在校大学生分布</h2>
                    </div>
                </div>
                <div id="chinaCollegeMap" class="map-visual real-map"></div>
                <div class="map-legend">
                    <strong id="chinaCollegeMapSummary">0 人 / 0 省级区域</strong>
                </div>
            </article>
            </div>
            <div class="col-12 col-xl-6">
            <article class="map-card card border-0 h-100">
                <div class="map-card-header card-header bg-transparent border-0">
                    <div>
                        <h2>海东市各区县在校大学生分布</h2>
                    </div>
                </div>
                <div id="haidongCollegeMap" class="map-visual real-map"></div>
                <div class="map-legend">
                    <strong id="haidongCollegeMapSummary">0 人 / 0 区县</strong>
                </div>
            </article>
            </div>
        </section>

        <section class="stats-grid row g-4">
            <div class="col-12 col-sm-6 col-xl-3">
            <article class="stat-card card border-0 h-100">
                <span class="stat-label">青年总数</span>
                <strong th:text="${stats.youthCount}">0</strong>
                <div class="stat-meta">在库青年信息总量</div>
            </article>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
            <article class="stat-card card border-0 h-100">
                <span class="stat-label">企业总数</span>
                <strong th:text="${stats.enterpriseCount}">0</strong>
                <div class="stat-meta">在库企业主体数量</div>
            </article>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
            <article class="stat-card card border-0 h-100">
                <span class="stat-label">岗位总数</span>
                <strong th:text="${stats.jobCount}">0</strong>
                <div class="stat-meta">在库岗位信息数量</div>
            </article>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
            <article class="stat-card card border-0 h-100">
                <span class="stat-label">政策总数</span>
                <strong th:text="${stats.policyCount}">0</strong>
                <div class="stat-meta">已录入政策数量</div>
            </article>
            </div>
        </section>

        <section class="list-grid row g-4">
            <div class="col-12 col-xl-6">
            <article class="card border-0 h-100">
                <div class="card-header bg-transparent border-0">
                    <div>
                        <h2>政策信息</h2>
                    </div>
                    <a class="btn btn-sm btn-outline-secondary" th:href="@{/policies}">更多</a>
                </div>
                <div class="table-responsive">
                <table class="simple-table table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th>标题</th>
                        <th>发布人</th>
                        <th>发布时间</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${recentPolicies}">
                        <td th:text="${item['title']}">政策标题</td>
                        <td th:text="${item['issuing_organization']}">发文单位</td>
                        <td th:text="${item['publish_time']}">发布时间</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(recentPolicies)}">
                        <td class="empty-cell" colspan="3">暂无政策摘要</td>
                    </tr>
                    </tbody>
                </table>
                </div>
            </article>
            </div>

            <div class="col-12 col-xl-6">
            <article class="card border-0 h-100">
                <div class="card-header bg-transparent border-0">
                    <div>
                        <h2>招聘信息</h2>
                    </div>
                    <a class="btn btn-sm btn-outline-secondary" th:href="@{/jobs}">更多</a>
                </div>
                <div class="table-responsive">
                <table class="simple-table table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th>岗位名称</th>
                        <th>企业名称</th>
                        <th>联系人</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${recentJobs}">
                        <td th:text="${item['job_name']}">岗位名称</td>
                        <td th:text="${item['enterprise_name']}">企业名称</td>
                        <td th:text="${item['contact_person']}">联系人</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(recentJobs)}">
                        <td class="empty-cell" colspan="3">暂无招聘摘要</td>
                    </tr>
                    </tbody>
                </table>
                </div>
            </article>
            </div>
        </section>
    </main>
</div>
<script th:inline="javascript">
    const collegeSchoolProvinceDistribution = /*[[${collegeSchoolProvinceDistributionJson}]]*/ '[]';
    const collegeHaidongNativeCountyDistribution = /*[[${collegeHaidongNativeCountyDistributionJson}]]*/ '[]';

    function parseData(raw) {
        return JSON.parse(raw || '[]');
    }

    function normalizeChinaProvinceName(name) {
        const nameMap = {
            '北京市': '北京',
            '天津市': '天津',
            '上海市': '上海',
            '重庆市': '重庆',
            '河北省': '河北',
            '山西省': '山西',
            '辽宁省': '辽宁',
            '吉林省': '吉林',
            '黑龙江省': '黑龙江',
            '江苏省': '江苏',
            '浙江省': '浙江',
            '安徽省': '安徽',
            '福建省': '福建',
            '江西省': '江西',
            '山东省': '山东',
            '河南省': '河南',
            '湖北省': '湖北',
            '湖南省': '湖南',
            '广东省': '广东',
            '海南省': '海南',
            '四川省': '四川',
            '贵州省': '贵州',
            '云南省': '云南',
            '陕西省': '陕西',
            '甘肃省': '甘肃',
            '青海省': '青海',
            '台湾省': '台湾',
            '内蒙古自治区': '内蒙古',
            '广西壮族自治区': '广西',
            '西藏自治区': '西藏',
            '宁夏回族自治区': '宁夏',
            '新疆维吾尔自治区': '新疆',
            '香港特别行政区': '香港',
            '澳门特别行政区': '澳门'
        };
        return nameMap[name] || name;
    }

    function toSeriesData(rawData, nameFormatter) {
        return parseData(rawData)
            .filter(item => item.regionName)
            .map(item => ({
                name: nameFormatter ? nameFormatter(item.regionName) : item.regionName,
                value: Number(item.total || 0)
            }));
    }

    function updateSummary(elementId, data, unitLabel) {
        const total = data.reduce((sum, item) => sum + Number(item.value || 0), 0);
        const regionCount = data.filter(item => Number(item.value || 0) > 0).length;
        document.getElementById(elementId).textContent = `${total} 人 / ${regionCount} ${unitLabel}`;
    }

    function renderMap(elementId, mapName, data, options) {
        const element = document.getElementById(elementId);
        const chart = echarts.init(element);
        const maxValue = Math.max(...data.map(item => item.value), 0);
        const hasData = data.length > 0 && maxValue > 0;
        chart.setOption({
            animation: true,
            animationDuration: 1200,
            animationEasing: 'cubicOut',
            animationDurationUpdate: 700,
            tooltip: {
                trigger: 'item',
                formatter: params => `${params.name}<br/>${params.value || 0} 人`
            },
            visualMap: {
                min: 0,
                max: Math.max(maxValue, 1),
                left: 18,
                bottom: 12,
                calculable: true,
                text: ['高', '低'],
                textStyle: {color: '#9fb5da'},
                inRange: {
                    color: ['#11386f', '#1e6ce5', '#4ed4ff']
                }
            },
            graphic: hasData ? [] : [{
                type: 'text',
                left: 'center',
                top: 'middle',
                style: {
                    text: '暂无地图数据',
                    fill: '#9fb5da',
                    fontSize: 16,
                    fontWeight: 600
                }
            }],
            series: [{
                type: 'map',
                map: mapName,
                roam: false,
                animationDuration: 1400,
                animationEasing: 'quarticOut',
                zoom: options.zoom,
                layoutCenter: options.layoutCenter || ['50%', '50%'],
                layoutSize: options.layoutSize,
                label: {
                    show: options.showLabel,
                    color: '#dce7ff',
                    fontSize: options.fontSize || 11
                },
                itemStyle: {
                    areaColor: '#0e3267',
                    borderColor: '#67d7ff',
                    borderWidth: 1
                },
                emphasis: {
                    label: {color: '#ffffff'},
                    itemStyle: {
                        areaColor: '#28b8ff'
                    }
                },
                data
            }]
        });
        window.addEventListener('resize', () => chart.resize());
    }

    async function loadMapJson(url) {
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error(`地图资源加载失败: ${url}`);
        }
        return response.json();
    }

    async function initHomepageMaps() {
        const chinaData = toSeriesData(collegeSchoolProvinceDistribution, normalizeChinaProvinceName);
        const haidongData = toSeriesData(collegeHaidongNativeCountyDistribution);
        updateSummary('chinaCollegeMapSummary', chinaData, '省级区域');
        updateSummary('haidongCollegeMapSummary', haidongData, '区县');

        try {
            const haidongGeoJson = await loadMapJson('/map/haidong.json');
            echarts.registerMap('haidong-students', haidongGeoJson);
            renderMap('chinaCollegeMap', 'china', chinaData, {
                zoom: 1.1,
                layoutCenter: ['50%', '52%'],
                layoutSize: '106%',
                showLabel: false
            });
            renderMap('haidongCollegeMap', 'haidong-students', haidongData, {
                zoom: 1.02,
                layoutSize: '92%',
                showLabel: true,
                fontSize: 12
            });
        } catch (error) {
            document.getElementById('chinaCollegeMap').innerHTML = '<div class="map-empty">中国地图资源加载失败</div>';
            document.getElementById('haidongCollegeMap').innerHTML = '<div class="map-empty">海东地图资源加载失败</div>';
            console.error(error);
        }
    }

    initHomepageMaps();
</script>
</body>
</html>
