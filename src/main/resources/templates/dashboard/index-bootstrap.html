<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/bootstrap-layout :: head (首页)}"></head>
<body data-bs-theme="dark" class="admin-body">
<div class="d-flex">
    <aside th:replace="~{fragments/bootstrap-sidebar :: sidebar}"></aside>

    <main class="main-content flex-grow-1">
        <div th:replace="~{fragments/bootstrap-topbar :: topbar}"></div>

        <div class="container-fluid py-4">
            <!-- 欢迎区域 -->
            <div class="page-hero mb-4">
                <h1 class="h3 mb-2">海东市联络服务青年就业创业信息平台</h1>
                <p class="text-secondary">数据驱动 · 精准服务 · 助力发展</p>
                <div class="d-flex gap-2 mt-3">
                    <a th:href="@{/analytics/college}" class="btn btn-outline-primary">
                        <i class="bi bi-mortarboard me-1"></i>在校大学生分析
                    </a>
                    <a th:href="@{/enterprises}" class="btn btn-outline-secondary">
                        <i class="bi bi-building me-1"></i>企业招聘信息
                    </a>
                </div>
            </div>

            <!-- 地图区域 -->
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-header">
                            <i class="bi bi-globe me-2"></i>海东市在校大学生全国分布
                        </div>
                        <div class="card-body p-0">
                            <div id="chinaCollegeMap" style="height: 360px;"></div>
                        </div>
                        <div class="card-footer d-flex justify-content-between align-items-center">
                            <span class="small text-secondary">数据来源：海东市青年信息库</span>
                            <span class="badge bg-primary" id="chinaCollegeMapSummary">0 人 / 0 省</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-header">
                            <i class="bi bi-map me-2"></i>海东市各区县大学生分布
                        </div>
                        <div class="card-body p-0">
                            <div id="haidongCollegeMap" style="height: 360px;"></div>
                        </div>
                        <div class="card-footer d-flex justify-content-between align-items-center">
                            <span class="small text-secondary">数据来源：海东市青年信息库</span>
                            <span class="badge bg-primary" id="haidongCollegeMapSummary">0 人 / 0 区县</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 统计卡片 -->
            <div class="row g-4 mb-4">
                <div class="col-sm-6 col-lg-3">
                    <div class="card border-primary-subtle">
                        <div class="card-body d-flex align-items-center">
                            <div class="flex-shrink-0">
                                <div class="rounded d-flex align-items-center justify-content-center"
                                     style="width: 48px; height: 48px; background: rgba(50, 214, 255, 0.15);">
                                    <i class="bi bi-people fs-4 text-brand"></i>
                                </div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-secondary mb-1 small">青年总数</h6>
                                <h3 class="mb-0 fw-bold" th:text="${stats?.youthCount ?: 0}">0</h3>
                                <small class="text-secondary">在库青年信息</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-lg-3">
                    <div class="card border-success-subtle">
                        <div class="card-body d-flex align-items-center">
                            <div class="flex-shrink-0">
                                <div class="rounded d-flex align-items-center justify-content-center"
                                     style="width: 48px; height: 48px; background: rgba(34, 197, 94, 0.15);">
                                    <i class="bi bi-building fs-4 text-success"></i>
                                </div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-secondary mb-1 small">企业总数</h6>
                                <h3 class="mb-0 fw-bold" th:text="${stats?.enterpriseCount ?: 0}">0</h3>
                                <small class="text-secondary">在库企业主体</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-lg-3">
                    <div class="card border-warning-subtle">
                        <div class="card-body d-flex align-items-center">
                            <div class="flex-shrink-0">
                                <div class="rounded d-flex align-items-center justify-content-center"
                                     style="width: 48px; height: 48px; background: rgba(251, 191, 36, 0.15);">
                                    <i class="bi bi-briefcase fs-4 text-warning"></i>
                                </div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-secondary mb-1 small">岗位总数</h6>
                                <h3 class="mb-0 fw-bold" th:text="${stats?.jobCount ?: 0}">0</h3>
                                <small class="text-secondary">在库岗位信息</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-lg-3">
                    <div class="card border-info-subtle">
                        <div class="card-body d-flex align-items-center">
                            <div class="flex-shrink-0">
                                <div class="rounded d-flex align-items-center justify-content-center"
                                     style="width: 48px; height: 48px; background: rgba(20, 151, 255, 0.15);">
                                    <i class="bi bi-file-text fs-4 text-info"></i>
                                </div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-secondary mb-1 small">政策总数</h6>
                                <h3 class="mb-0 fw-bold" th:text="${stats?.policyCount ?: 0}">0</h3>
                                <small class="text-secondary">已录入政策</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 信息列表 -->
            <div class="row g-4">
                <!-- 政策信息 -->
                <div class="col-lg-6">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span><i class="bi bi-file-earmark-text me-2"></i>最新政策</span>
                            <a th:href="@{/policies}" class="btn btn-sm btn-outline-secondary">更多</a>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr>
                                            <th class="small text-secondary">标题</th>
                                            <th class="small text-secondary" style="width: 120px;">发布单位</th>
                                            <th class="small text-secondary" style="width: 100px;">发布时间</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="item : ${recentPolicies}">
                                            <td>
                                                <a th:href="@{/policies/{id}(id=${item.id})}" class="text-decoration-none text-brand text-truncate d-inline-block" style="max-width: 280px;"
                                                   th:text="${item.title}" th:title="${item.title}">政策标题</a>
                                            </td>
                                            <td class="small text-secondary" th:text="${item.issuingOrganization}">发文单位</td>
                                            <td class="small text-secondary" th:text="${item.publishTime}">发布时间</td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(recentPolicies)}">
                                            <td colspan="3" class="text-center py-4 text-secondary">
                                                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                                暂无政策信息
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 招聘信息 -->
                <div class="col-lg-6">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span><i class="bi bi-briefcase me-2"></i>最新岗位</span>
                            <a th:href="@{/jobs}" class="btn btn-sm btn-outline-secondary">更多</a>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr>
                                            <th class="small text-secondary">岗位名称</th>
                                            <th class="small text-secondary" style="width: 120px;">企业</th>
                                            <th class="small text-secondary" style="width: 100px;">薪资</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="item : ${recentJobs}">
                                            <td>
                                                <a th:href="@{/jobs/{id}(id=${item.id})}" class="text-decoration-none text-brand text-truncate d-inline-block" style="max-width: 280px;"
                                                   th:text="${item.jobName}" th:title="${item.jobName}">岗位名称</a>
                                            </td>
                                            <td class="small text-secondary" th:text="${item.enterpriseName}">企业名称</td>
                                            <td class="small text-secondary" th:text="${item.salaryRange}">薪资范围</td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(recentJobs)}">
                                            <td colspan="3" class="text-center py-4 text-secondary">
                                                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                                暂无岗位信息
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

<!-- ECharts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts/map/js/china.js"></script>

<script th:inline="javascript">
    // 加载地图数据
    /*<![CDATA[*/
    const chinaMapData = [[${chinaMapData}]] || [];
    const haidongMapData = [[${haidongMapData}]] || [];
    /*]]>*/

    // 初始化中国地图
    function initChinaMap() {
        const chart = echarts.init(document.getElementById('chinaCollegeMap'));
        const option = {
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'item',
                backgroundColor: 'rgba(7, 20, 54, 0.95)',
                borderColor: 'rgba(58, 216, 255, 0.36)',
                textStyle: { color: '#f1f7ff' }
            },
            visualMap: {
                min: 0,
                max: 100,
                left: 'left',
                top: 'bottom',
                text: ['高', '低'],
                textStyle: { color: '#8ea6cf' },
                inRange: {
                    color: ['rgba(50, 214, 255, 0.2)', 'rgba(50, 214, 255, 0.6)', '#32d6ff']
                },
                calculable: true
            },
            series: [{
                name: '大学生人数',
                type: 'map',
                map: 'china',
                roam: true,
                emphasis: {
                    label: { show: true, color: '#f1f7ff' },
                    itemStyle: {
                        areaColor: 'rgba(50, 214, 255, 0.3)'
                    }
                },
                itemStyle: {
                    areaColor: 'rgba(8, 24, 63, 0.8)',
                    borderColor: 'rgba(69, 145, 255, 0.3)',
                    borderWidth: 1
                },
                data: chinaMapData
            }]
        };
        chart.setOption(option);
        window.addEventListener('resize', () => chart.resize());
    }

    // 初始化海东地图
    function initHaidongMap() {
        // 海东地区地图需要自定义geoJSON或使用echarts区县地图
        // 这里先使用柱状图作为示例
        const chart = echarts.init(document.getElementById('haidongCollegeMap'));
        const option = {
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                backgroundColor: 'rgba(7, 20, 54, 0.95)',
                borderColor: 'rgba(58, 216, 255, 0.36)',
                textStyle: { color: '#f1f7ff' }
            },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '3%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                data: haidongMapData.map(item => item.name || item.regionName),
                axisLine: { lineStyle: { color: 'rgba(69, 145, 255, 0.3)' } },
                axisLabel: { color: '#8ea6cf', rotate: 30 }
            },
            yAxis: {
                type: 'value',
                axisLine: { show: false },
                axisLabel: { color: '#8ea6cf' },
                splitLine: { lineStyle: { color: 'rgba(69, 145, 255, 0.15)' } }
            },
            series: [{
                data: haidongMapData.map(item => item.value || item.count),
                type: 'bar',
                itemStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(50, 214, 255, 0.8)' },
                        { offset: 1, color: 'rgba(50, 214, 255, 0.2)' }
                    ]),
                    borderRadius: [4, 4, 0, 0]
                }
            }]
        };
        chart.setOption(option);
        window.addEventListener('resize', () => chart.resize());
    }

    // 更新统计摘要
    function updateSummaries() {
        const chinaTotal = chinaMapData.reduce((sum, item) => sum + (item.value || 0), 0);
        const chinaProvinces = chinaMapData.filter(item => item.value > 0).length;
        document.getElementById('chinaCollegeMapSummary').textContent = `${chinaTotal} 人 / ${chinaProvinces} 省`;

        const haidongTotal = haidongMapData.reduce((sum, item) => sum + (item.value || item.count || 0), 0);
        document.getElementById('haidongCollegeMapSummary').textContent = `${haidongTotal} 人 / ${haidongMapData.length} 区县`;
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
        initChinaMap();
        initHaidongMap();
        updateSummaries();
    });
</script>
</body>
</html>
