<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招聘岗位表单</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body class="admin-body">
<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content container-fluid">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle})}"></div>
        <section class="drawer-workspace">
            <section class="drawer-content-view" th:fragment="drawerContent">
                <div class="drawer-panel-header">
                    <h2 class="h4 mb-1" th:text="${formTitle}">新增招聘岗位</h2>
                </div>
                <div class="alert error-alert" th:if="${formError}" th:text="${formError}"></div>
                <form th:action="@{${formAction}}" th:object="${jobForm}" method="post" class="edit-form row g-3" novalidate>
                    <div class="alert error-alert validation-error-banner col-12" th:if="${#fields.hasAnyErrors()}">请检查并填写所有必填项</div>
                    <label class="col-12 col-md-6">
                        <span>所属企业</span>
                        <select class="form-select" th:field="*{enterpriseId}" required>
                            <option value="">请选择企业</option>
                            <option th:each="enterprise : ${enterprises}" th:value="${enterprise.id}"
                                    th:text="${enterprise.enterpriseName}"></option>
                        </select>
                    </label>
                    <label class="col-12 col-md-6"><span>岗位名称</span><input class="form-control" type="text" th:field="*{jobName}" required></label>
                    <label class="col-12 col-md-6"><span>岗位类别</span><input class="form-control" type="text" th:field="*{jobCategory}"></label>
                    <label class="job-multiselect-label col-12 col-md-6">
                        <span>专业要求</span>
                        <select class="form-select" th:field="*{majorCodes}" multiple data-multiselect
                                data-placeholder="请选择专业要求" th:attr="data-unlimited-value=${unlimitedOptionValue}">
                            <option th:value="${unlimitedOptionValue}">不限</option>
                            <option th:each="item : ${majorOptions}" th:value="${item.majorCode}" th:text="${item.majorName}"></option>
                        </select>
                    </label>
                    <label class="job-multiselect-label col-12 col-md-6">
                        <span>学历要求</span>
                        <select class="form-select" th:field="*{educationRequirements}" multiple data-multiselect
                                data-placeholder="请选择学历要求" th:attr="data-unlimited-value=${unlimitedOptionValue}">
                            <option th:value="${unlimitedOptionValue}">不限</option>
                            <option th:each="item : ${educationOptions}" th:value="${item.dictValue}" th:text="${item.dictLabel}"></option>
                        </select>
                    </label>
                    <label class="job-multiselect-label col-12 col-md-6">
                        <span>学校类别</span>
                        <select class="form-select" th:field="*{schoolCategoryIds}" multiple data-multiselect data-placeholder="请选择学校类别">
                            <option th:each="item : ${schoolCategoryOptions}" th:value="${item.id}" th:text="${item.dictLabel}"></option>
                        </select>
                    </label>
                    <label class="job-multiselect-label col-12 col-md-6">
                        <span>学校标签</span>
                        <select class="form-select" th:field="*{schoolTagIds}" multiple data-multiselect data-placeholder="请选择学校标签">
                            <option th:each="item : ${schoolTagOptions}" th:value="${item.id}" th:text="${item.tagName}"></option>
                        </select>
                    </label>
                    <label class="col-12 col-md-6">
                        <span>经验要求</span>
                        <select class="form-select" th:field="*{experienceRequirement}">
                            <option value="">请选择</option>
                            <option th:each="item : ${experienceOptions}" th:value="${item.dictValue}" th:text="${item.dictLabel}"></option>
                        </select>
                    </label>
                    <label class="col-12 col-md-6">
                        <span>薪资待遇</span>
                        <select class="form-select" th:field="*{salaryRange}">
                            <option value="">请选择</option>
                            <option th:each="item : ${salaryOptions}" th:value="${item.dictValue}" th:text="${item.dictLabel}"></option>
                        </select>
                    </label>
                    <label class="col-12 col-md-6"><span>招聘人数</span><input class="form-control" type="number" th:field="*{recruitCount}"></label>
                    <div class="filter-block col-12 col-md-6" data-region-step data-region-api-url="/api/regions" data-region-placeholder="请选择">
                        <span>工作地区</span>
                        <input type="hidden" th:field="*{workProvinceCode}" data-region-province>
                        <input type="hidden" th:field="*{workCityCode}" data-region-city>
                        <input type="hidden" th:field="*{workCountyCode}" data-region-county>
                    </div>
                    <label class="col-12 col-md-6"><span>联系人</span><input class="form-control" type="text" th:field="*{contactPerson}"></label>
                    <label class="col-12 col-md-6"><span>联系电话</span><input class="form-control" type="text" th:field="*{contactPhone}"></label>
                    <label class="col-12 col-md-6" th:if="${sortFieldVisible}"><span>排序</span><input class="form-control" type="number" th:field="*{sortOrder}" placeholder="数值越小越靠前"></label>
                    <label class="full-width col-12"><span>岗位描述</span><textarea class="form-control" th:field="*{jobDescription}"></textarea></label>
                    <div class="form-actions full-width col-12">
                        <a class="btn btn-outline-secondary" th:href="@{/jobs}" data-drawer-close>取消</a>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </section>
        </section>
    </main>
</div>
<script th:src="@{/js/region-step-select.js}"></script>
<script th:src="@{/js/job-form-multiselect.js}"></script>
<script th:src="@{/js/alert-banner.js}"></script>
</body>
</html>
