<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岗位匹配学生</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body class="admin-body">
<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content container-fluid">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle})}"></div>
        <section class="drawer-workspace">
            <section class="drawer-content-view match-results-drawer" th:fragment="drawerContent">
                <div class="drawer-panel-header">
                    <h2 class="h4 mb-1" th:text="${jobPost.jobName + ' 匹配学生'}">岗位匹配学生</h2>
                </div>
                <div class="detail-grid row g-3">
                    <div class="col-12 col-sm-6"><span>专业要求</span><strong th:text="${#strings.isEmpty(jobPost.majorRequirementSummary) ? '未限制' : jobPost.majorRequirementSummary}">未限制</strong></div>
                    <div class="col-12 col-sm-6"><span>学历要求</span><strong th:text="${#strings.isEmpty(jobPost.educationRequirement) ? '未限制' : jobPost.educationRequirement}">未限制</strong></div>
                    <div class="col-12 col-sm-6"><span>学校类别</span><strong th:text="${#strings.isEmpty(jobPost.schoolCategorySummary) ? '未限制' : jobPost.schoolCategorySummary}">未限制</strong></div>
                    <div class="col-12 col-sm-6"><span>薪资待遇</span><strong th:text="${#strings.isEmpty(salaryRangeLabel) ? '未设置' : salaryRangeLabel}">未设置</strong></div>
                </div>

                <form class="pagination-bar d-flex flex-wrap justify-content-between align-items-center" method="get" th:action="@{'/jobs/' + ${jobPost.id} + '/matches'}">
                    <div class="pagination-meta"
                         th:text="${'共匹配到 ' + totalCount + ' 名学生，当前第 ' + currentPage + ' / ' + totalPages + ' 页'}">共匹配到 0 名学生</div>
                    <div class="pagination-tools d-flex align-items-center gap-3" th:if="${totalCount > 0}">
                        <label class="pagination-page-size d-inline-flex align-items-center gap-2 mb-0">
                            <span>每页</span>
                            <select class="form-select form-select-sm" name="pageSize" data-page-size-select>
                                <option value="10" th:selected="${pageSize == 10}">10</option>
                                <option value="20" th:selected="${pageSize == 20}">20</option>
                                <option value="50" th:selected="${pageSize == 50}">50</option>
                                <option value="100" th:selected="${pageSize == 100}">100</option>
                            </select>
                            <span>条</span>
                        </label>
                        <nav aria-label="匹配结果分页">
                            <ul class="pagination pagination-sm mb-0">
                                <li class="page-item" th:classappend="${!hasPrevious} ? ' disabled'">
                                    <button class="page-link" type="submit" name="page"
                                            th:value="${previousPage}" th:disabled="${!hasPrevious}">上一页</button>
                                </li>
                                <li class="page-item" th:if="${showFirstPage}">
                                    <button class="page-link" type="submit" name="page"
                                            th:value="${firstPage}" th:text="${firstPage}">1</button>
                                </li>
                                <li class="page-item disabled" th:if="${showLeadingEllipsis}">
                                    <span class="page-link">...</span>
                                </li>
                                <li class="page-item"
                                    th:each="pageNumber : ${pageNumbers}"
                                    th:classappend="${pageNumber == currentPage} ? ' active'">
                                    <button class="page-link"
                                            type="submit"
                                            name="page"
                                            th:value="${pageNumber}"
                                            th:text="${pageNumber}"
                                            th:disabled="${pageNumber == currentPage}">1</button>
                                </li>
                                <li class="page-item disabled" th:if="${showTrailingEllipsis}">
                                    <span class="page-link">...</span>
                                </li>
                                <li class="page-item" th:if="${showLastPage}">
                                    <button class="page-link" type="submit" name="page"
                                            th:value="${lastPage}" th:text="${lastPage}">99</button>
                                </li>
                                <li class="page-item" th:classappend="${!hasNext} ? ' disabled'">
                                    <button class="page-link" type="submit" name="page"
                                            th:value="${nextPage}" th:disabled="${!hasNext}">下一页</button>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </form>

                <div class="match-results-table-shell table-responsive">
                    <table class="simple-table match-results-table table table-hover align-middle mb-0">
                        <thead>
                        <tr>
                            <th class="index-cell">序号</th>
                            <th>姓名</th>
                            <th>性别</th>
                            <th>学历</th>
                            <th>学校</th>
                            <th>专业</th>
                            <th>专业类别</th>
                            <th>联系方式</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item, itemStat : ${records}">
                            <td class="index-cell" th:text="${(currentPage - 1) * pageSize + itemStat.count}">1</td>
                            <td th:text="${item.name}">学生姓名</td>
                            <td th:text="${item.gender}">男</td>
                            <td th:text="${item.educationLevelName}">本科</td>
                            <td th:text="${item.schoolName}">青海大学</td>
                            <td th:text="${item.major}">计算机科学与技术</td>
                            <td th:text="${item.majorCategory}">工学</td>
                            <td th:text="${item.phone}">13900000001</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(records)}">
                            <td class="empty-cell" colspan="8">当前岗位条件下暂无匹配学生</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>
</div>
<script th:src="@{/js/list-pagination.js}"></script>
<script th:src="@{/js/record-drawer.js}"></script>
</body>
</html>
