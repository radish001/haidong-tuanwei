<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/bootstrap-layout :: head (${formTitle})}"></head>
<body data-bs-theme="dark" class="admin-body">
<div class="d-flex">
    <aside th:replace="~{fragments/bootstrap-sidebar :: sidebar}"></aside>

    <main class="main-content flex-grow-1">
        <div th:replace="~{fragments/bootstrap-topbar :: topbar}"></div>

        <div class="container-fluid py-4">
            <!-- 页面标题 -->
            <div class="page-hero mb-4">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-2">
                        <li class="breadcrumb-item">
                            <a th:href="@{/dashboard}" class="text-decoration-none text-secondary">首页</a>
                        </li>
                        <li class="breadcrumb-item">
                            <a th:href="@{/jobs}" class="text-decoration-none text-secondary">岗位管理</a>
                        </li>
                        <li class="breadcrumb-item active text-brand" aria-current="page" th:text="${formTitle}">新增</li>
                    </ol>
                </nav>
                <h1 class="h3 mb-0" th:text="${formTitle}">新增招聘岗位</h1>
                <p class="text-secondary mt-2">填写岗位基本信息和招聘要求。</p>
            </div>

            <!-- 表单卡片 -->
            <div class="row">
                <div class="col-12 col-xl-8">
                    <div class="card border-primary-subtle">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span><i class="bi bi-briefcase-fill me-2"></i>岗位信息</span>
                            <a th:href="@{${cancelUrl} ?: '/jobs'}" class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-x-lg"></i>
                            </a>
                        </div>
                        <div class="card-body">
                            <!-- 错误提示 -->
                            <div class="alert alert-danger" th:if="${formError}" th:text="${formError}">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            </div>

                            <form th:action="@{${formAction}}" th:object="${jobForm}" method="post" id="jobForm">
                                <div class="row g-3">
                                    <!-- 所属企业 -->
                                    <div class="col-md-6">
                                        <label class="form-label">所属企业 <span class="text-danger">*</span></label>
                                        <select class="form-select tomselect-searchable" th:field="*{enterpriseId}" required>
                                            <option value="">请选择企业</option>
                                            <option th:each="e : ${enterprises}" th:value="${e.id}" th:text="${e.enterpriseName}"></option>
                                        </select>
                                    </div>

                                    <!-- 岗位名称 -->
                                    <div class="col-md-6">
                                        <label class="form-label">岗位名称 <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" th:field="*{jobName}" placeholder="如：Java开发工程师" required>
                                    </div>

                                    <!-- 岗位类别 -->
                                    <div class="col-md-6">
                                        <label class="form-label">岗位类别</label>
                                        <input type="text" class="form-control" th:field="*{jobCategory}" placeholder="如：技术研发">
                                    </div>

                                    <!-- 经验要求 -->
                                    <div class="col-md-6">
                                        <label class="form-label">经验要求</label>
                                        <select class="form-select tomselect-basic" th:field="*{experienceRequirement}">
                                            <option value="">请选择</option>
                                            <option th:each="item : ${experienceOptions}" th:value="${item.dictValue}" th:text="${item.dictLabel}"></option>
                                        </select>
                                    </div>
                                </div>

                                <hr class="my-4" style="border-color: rgba(69, 145, 255, 0.2);">

                                <h6 class="mb-3 text-brand"><i class="bi bi-clipboard-check-fill me-2"></i>招聘要求</h6>

                                <div class="row g-3">
                                    <!-- 专业要求（多选） -->
                                    <div class="col-12">
                                        <label class="form-label">专业要求</label>
                                        <select class="form-select" th:field="*{majorCodes}" multiple data-multiselect data-placeholder="请选择专业要求">
                                            <option value=""></option>
                                            <option th:each="item : ${majorOptions}" th:value="${item.majorCode}" th:text="${item.majorName}"></option>
                                        </select>
                                        <div class="form-text">可多选，支持搜索</div>
                                    </div>

                                    <!-- 学历要求（多选） -->
                                    <div class="col-12">
                                        <label class="form-label">学历要求</label>
                                        <select class="form-select" th:field="*{educationRequirements}" multiple data-multiselect data-placeholder="请选择学历要求">
                                            <option value=""></option>
                                            <option th:each="item : ${educationOptions}" th:value="${item.dictValue}" th:text="${item.dictLabel}"></option>
                                        </select>
                                    </div>

                                    <!-- 学校类别（多选） -->
                                    <div class="col-12">
                                        <label class="form-label">学校类别</label>
                                        <select class="form-select" th:field="*{schoolCategoryIds}" multiple data-multiselect data-placeholder="请选择学校类别">
                                            <option value=""></option>
                                            <option th:each="item : ${schoolCategoryOptions}" th:value="${item.id}" th:text="${item.dictLabel}"></option>
                                        </select>
                                    </div>

                                    <!-- 学校标签（多选） -->
                                    <div class="col-12">
                                        <label class="form-label">学校标签</label>
                                        <select class="form-select" th:field="*{schoolTagIds}" multiple data-multiselect data-placeholder="请选择学校标签">
                                            <option value=""></option>
                                            <option th:each="item : ${schoolTagOptions}" th:value="${item.id}" th:text="${item.tagName}"></option>
                                        </select>
                                    </div>

                                    <!-- 薪资待遇 -->
                                    <div class="col-md-6">
                                        <label class="form-label">薪资待遇</label>
                                        <select class="form-select tomselect-basic" th:field="*{salaryRange}">
                                            <option value="">请选择</option>
                                            <option th:each="item : ${salaryOptions}" th:value="${item.dictValue}" th:text="${item.dictLabel}"></option>
                                        </select>
                                    </div>

                                    <!-- 招聘人数 -->
                                    <div class="col-md-6">
                                        <label class="form-label">招聘人数</label>
                                        <input type="number" class="form-control" th:field="*{recruitCount}" placeholder="如：5" min="1">
                                    </div>
                                </div>

                                <hr class="my-4" style="border-color: rgba(69, 145, 255, 0.2);">

                                <h6 class="mb-3 text-brand"><i class="bi bi-geo-alt-fill me-2"></i>联系信息</h6>

                                <div class="row g-3">
                                    <!-- 工作地区（级联选择） -->
                                    <div class="col-12">
                                        <label class="form-label">工作地区</label>
                                        <div data-region-cascader data-region-api-url="/api/regions" data-region-placeholder="请选择">
                                            <input type="hidden" th:field="*{workProvinceCode}" data-region-province>
                                            <input type="hidden" th:field="*{workCityCode}" data-region-city>
                                            <input type="hidden" th:field="*{workCountyCode}" data-region-county>
                                        </div>
                                    </div>

                                    <!-- 联系人 -->
                                    <div class="col-md-6">
                                        <label class="form-label">联系人</label>
                                        <input type="text" class="form-control" th:field="*{contactPerson}" placeholder="HR姓名">
                                    </div>

                                    <!-- 联系电话 -->
                                    <div class="col-md-6">
                                        <label class="form-label">联系电话</label>
                                        <input type="tel" class="form-control" th:field="*{contactPhone}" placeholder="手机号码">
                                    </div>

                                    <!-- 岗位描述 -->
                                    <div class="col-12">
                                        <label class="form-label">岗位描述</label>
                                        <textarea class="form-control" th:field="*{jobDescription}" rows="5" placeholder="详细描述岗位职责、任职要求、福利待遇等"></textarea>
                                    </div>
                                </div>

                                <!-- 操作按钮 -->
                                <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top" style="border-color: rgba(69, 145, 255, 0.2);">
                                    <a th:href="@{${cancelUrl} ?: '/jobs'}" class="btn btn-secondary">
                                        <i class="bi bi-x-lg me-1"></i>取消
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-lg me-1"></i>保存
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- 右侧提示 -->
                <div class="col-12 col-xl-4">
                    <div class="card mb-3">
                        <div class="card-header">
                            <i class="bi bi-lightbulb me-2"></i>填写提示
                        </div>
                        <div class="card-body">
                            <ul class="list-unstyled mb-0 small text-secondary">
                                <li class="mb-2">
                                    <i class="bi bi-check-circle-fill text-success me-2"></i>
                                    多选框支持批量选择，点击标签可删除
                                </li>
                                    <i class="bi bi-check-circle-fill text-success me-2"></i>
                                    工作地区支持省市区三级精确选择
                                </li>
                                <li class="mb-2">
                                    <i class="bi bi-check-circle-fill text-success me-2"></i>
                                    详细的岗位描述有助于提高匹配度
                                </li>
                                <li class="mb-2">
                                    <i class="bi bi-check-circle-fill text-success me-2"></i>
                                    岗位发布后将对符合条件的青年推送
                                </li>
                            </ul>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <i class="bi bi-info-circle me-2"></i>人才匹配
                        </div>
                        <div class="card-body">
                            <p class="small text-secondary mb-3">保存岗位后，系统将根据招聘要求自动匹配合适的青年人才。</p>
                            <a th:if="${jobForm.id != null}" th:href="@{/jobs/{id}/matches(id=${jobForm.id})}" class="btn btn-sm btn-outline-primary w-100">
                                <i class="bi bi-person-check me-1"></i>查看匹配结果
                            </a>
                            <button th:unless="${jobForm.id != null}" class="btn btn-sm btn-outline-secondary w-100" disabled>
                                <i class="bi bi-person-check me-1"></i>请先保存岗位
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

<!-- Tom Select JS -->
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<!-- 级联选择器 -->
<script th:src="@{/js/region-cascader-tomselect.js}"></script>

<!-- 多选组件 -->
<script th:src="@{/js/multiselect-tomselect.js}"></script>

<script>
    // 初始化基础下拉框
    document.querySelectorAll('.tomselect-basic').forEach(select => {
        new TomSelect(select, {
            placeholder: '请选择',
            allowEmptyOption: true,
            maxItems: 1
        });
    });

    // 初始化可搜索下拉框
    document.querySelectorAll('.tomselect-searchable').forEach(select => {
        new TomSelect(select, {
            placeholder: '请选择或搜索',
            allowEmptyOption: true,
            maxItems: 1,
            plugins: ['dropdown_input']
        });
    });
</script>
</body>
</html>
