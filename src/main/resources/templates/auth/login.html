<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-body">
<main class="login-shell">
    <section class="login-panel">
        <div class="login-header">
            <div class="brand-mark large">HD</div>
            <h1>海东青年就业创业平台</h1>
            <p>管理员登录后可访问青年信息、企业招聘、政策管理和数据分析模块。</p>
        </div>

        <div class="alert error-alert" th:if="${param.error}">
            用户名或密码错误，请重新输入。
        </div>
        <div class="alert success-alert" th:if="${param.logout}">
            你已安全退出系统。
        </div>

        <form th:action="@{/login}" method="post" class="login-form">
            <label>
                <span>用户名</span>
                <input type="text" name="username" value="admin" autocomplete="username">
            </label>
            <label>
                <span>密码</span>
                <input type="password" name="password" value="123456" autocomplete="current-password">
            </label>
            <button type="submit">登录后台</button>
        </form>

        <div class="login-tip">
            默认账号：<code>admin</code> / <code>123456</code>
        </div>
    </section>
</main>
</body>
</html>
