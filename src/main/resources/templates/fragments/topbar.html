<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="topbar(pageTitle)">
    <header class="topbar navbar navbar-expand-lg border rounded-3 shadow-none">
        <div class="container-fluid px-0">
            <div class="topbar-toolbar d-flex flex-wrap align-items-center gap-3 gap-lg-4">
                <button type="button" class="mobile-nav-toggle btn btn-outline-info btn-sm" data-sidebar-toggle aria-label="切换导航">
                    <span class="mobile-nav-toggle-icon"></span>
                </button>
                <div class="topbar-banner">
                    <span class="topbar-banner-wing topbar-banner-wing-start" aria-hidden="true"></span>
                    <div class="topbar-banner-center">
                        <h1 th:text="${pageTitle == '基础数据管理' ? '系统设置' : pageTitle}">后台首页</h1>
                        <p>海东市联系服务青年就业创业平台</p>
                    </div>
                    <span class="topbar-banner-wing topbar-banner-wing-end" aria-hidden="true"></span>
                </div>
                <div class="topbar-actions ms-auto d-flex align-items-center gap-2 flex-wrap justify-content-end">
                    <span class="system-status badge rounded-pill text-bg-success-subtle border border-success-subtle text-success-emphasis">
                        <span class="status-dot"></span>
                        <span>系统运行中</span>
                    </span>
                    <div class="dropdown" th:if="${currentUser != null}">
                        <button class="user-chip btn btn-outline-secondary dropdown-toggle"
                                type="button"
                                data-bs-toggle="dropdown"
                                aria-expanded="false">
                            <i class="bi bi-person-circle user-chip-icon" aria-hidden="true"></i>
                            <span class="user-chip-text">
                                <span class="user-name" th:text="${currentUser.nickname}">系统管理员</span>
                                <span class="user-role">管理员</span>
                            </span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end topbar-dropdown-menu">
                            <li>
                                <span class="dropdown-item-text text-secondary small">当前登录账号</span>
                            </li>
                            <li>
                                <span class="dropdown-item-text" th:text="${currentUser.nickname}">系统管理员</span>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="m-0">
                                    <button type="submit" class="dropdown-item topbar-logout-item d-flex align-items-center justify-content-center gap-2">
                                        <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
                                        <span>退出登录</span>
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                    <form th:action="@{/logout}" method="post" class="topbar-logout-inline" th:if="${currentUser == null}">
                        <button type="submit" class="btn btn-outline-secondary">退出登录</button>
                    </form>
                </div>
            </div>
        </div>
    </header>
    <div class="sidebar-backdrop" data-sidebar-backdrop hidden></div>
    <div class="modal fade" id="global-confirm-modal" tabindex="-1" aria-hidden="true" aria-labelledby="global-confirm-modal-title">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h5 class="modal-title" id="global-confirm-modal-title" data-dialog-title>确认操作</h5>
                        <p class="small text-secondary mb-0 mt-1" data-dialog-message></p>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-0" data-dialog-detail hidden></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-dialog-cancel>取消</button>
                    <button type="button" class="btn btn-primary" data-dialog-confirm>确认</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/treeselectjs@0.14.2/dist/treeselectjs.umd.js"></script>
    <script th:src="@{/js/bootstrap-enhancements.js}"></script>
    <script th:src="@{/js/job-form-multiselect.js}"></script>
    <script th:src="@{/js/alert-banner.js}"></script>
</th:block>
</body>
</html>
