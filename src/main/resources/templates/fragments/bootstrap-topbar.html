<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<nav th:fragment="topbar" class="topbar d-flex align-items-center justify-content-between">
    <!-- 左侧：页面标题 + 面包屑 -->
    <div class="d-flex align-items-center">
        <!-- 移动端菜单按钮 -->
        <button class="btn btn-sm btn-outline-secondary d-lg-none me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
            <i class="bi bi-list"></i>
        </button>

        <div>
            <h1 class="h4 mb-0" th:if="${pageTitle}" th:text="${pageTitle}">页面标题</h1>
            <nav aria-label="breadcrumb" th:if="${breadcrumbs}">
                <ol class="breadcrumb mb-0 mt-1">
                    <li class="breadcrumb-item">
                        <a th:href="@{/dashboard}" class="text-decoration-none text-secondary">
                            <i class="bi bi-house-door-fill me-1"></i>首页
                        </a>
                    </li>
                    <li class="breadcrumb-item" th:each="crumb, iter : ${breadcrumbs}"
                        th:classappend="${iter.last} ? 'active' : ''"
                        th:aria-current="${iter.last} ? 'page' : null">
                        <a th:if="!${iter.last}" th:href="${crumb.url}" th:text="${crumb.label}" class="text-decoration-none text-secondary">标题</a>
                        <span th:if="${iter.last}" th:text="${crumb.label}" class="text-brand">标题</span>
                    </li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- 右侧：操作按钮区 -->
    <div class="d-flex align-items-center gap-2">
        <!-- 搜索框（如果启用） -->
        <div class="input-group d-none d-md-flex" th:if="${enableSearch}" style="max-width: 300px;">
            <span class="input-group-text bg-transparent border-secondary">
                <i class="bi bi-search text-secondary"></i>
            </span>
            <input type="text" class="form-control form-control-sm bg-transparent" placeholder="搜索...">
        </div>

        <!-- 工具按钮 -->
        <div class="btn-group" th:if="${topbarActions}">
            <a th:each="action : ${topbarActions}" th:href="${action.url}"
               th:class="'btn btn-sm btn-' + ${action.style ?: 'outline-primary'}">
                <i th:class="'bi bi-' + ${action.icon}" th:if="${action.icon}"></i>
                <span th:text="${action.label}">操作</span>
            </a>
        </div>

        <!-- 默认操作：导出/导入/新增 -->
        <a th:if="${exportUrl}" th:href="${exportUrl}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-download"></i>
            <span class="d-none d-md-inline ms-1">导出</span>
        </a>

        <a th:if="${importUrl}" th:href="${importUrl}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-upload"></i>
            <span class="d-none d-md-inline ms-1">导入</span>
        </a>

        <a th:if="${createUrl}" th:href="${createUrl}" class="btn btn-sm btn-primary">
            <i class="bi bi-plus-lg"></i>
            <span class="d-none d-md-inline ms-1" th:text="${createLabel} ?: '新增'">新增</span>
        </a>
    </div>
</nav>

</html>
