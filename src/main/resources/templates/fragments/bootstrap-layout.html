<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head (title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">海东市联络服务平台</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">

    <!-- Tom Select CSS -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">

    <!-- 自定义深色主题 -->
    <link rel="stylesheet" th:href="@{/css/bootstrap-dark.css}">
    <link rel="stylesheet" th:href="@{/css/tomselect-dark.css}">
</head>

<body th:fragment="body (content)" class="admin-body" data-bs-theme="dark">
    <div class="d-flex">
        <!-- 侧边栏 -->
        <aside th:replace="~{fragments/bootstrap-sidebar :: sidebar}"></aside>

        <!-- 主内容区 -->
        <main class="main-content flex-grow-1">
            <!-- 顶部栏 -->
            <div th:replace="~{fragments/bootstrap-topbar :: topbar}"></div>

            <!-- 页面内容 -->
            <div th:replace="${content}"></div>
        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
            crossorigin="anonymous"></script>

    <!-- Tom Select JS -->
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

    <!-- 级联选择器 -->
    <script th:src="@{/js/region-cascader-tomselect.js}"></script>

    <!-- 多选组件 -->
    <script th:src="@{/js/multiselect-tomselect.js}"></script>
</body>
</html>
