<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政策管理</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
</head>
<body class="admin-body">
<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle})}"></div>
        <section class="page-hero">
            <h2 class="page-hero-title">就业创业政策</h2>
            <p class="page-hero-subtitle">统一展示政策标题、发布单位、发布时间和状态，保留富文本详情维护能力。</p>
        </section>
        <div class="drawer-page-layout" data-drawer-page>
        <section class="panel drawer-list-panel">
            <div class="tab-row">
                <div class="tab-list">
                    <a class="tab-link active" th:href="@{/policies}">政策列表</a>
                </div>
            </div>
            <div class="panel-header">
                <div>
                    <h2>政策文章列表</h2>
                    <p>支持富文本内容维护、状态切换和详情查看。</p>
                </div>
            </div>
            <div class="alert success-alert" th:if="${successMessage}" th:text="${successMessage}"></div>

            <div class="ajax-list-shell" data-ajax-list-root th:fragment="listContent">
            <div class="youth-toolbar">
                <form class="filter-form compact-filter" method="get" id="policy-list-form" data-ajax-form>
                    <input type="text" name="title" th:value="${query.title}" placeholder="标题">
                    <input type="text" name="issuingOrganization" th:value="${query.issuingOrganization}" placeholder="发布单位">
                    <select name="status">
                        <option value="">状态</option>
                        <option value="0" th:selected="${query.status != null and query.status == 0}">草稿</option>
                        <option value="1" th:selected="${query.status != null and query.status == 1}">已发布</option>
                    </select>
                    <div class="filter-actions-inline">
                        <button type="submit">查询</button>
                        <a class="secondary-button" data-ajax-link th:href="@{/policies(pageSize=${pageSize})}">重置</a>
                    </div>
                </form>

                <div class="panel-actions youth-page-actions">
                    <a class="ghost-button" data-drawer-link th:href="@{/policies/new}">新增</a>
                    <button type="button"
                            class="secondary-button"
                            data-batch-delete-button
                            data-batch-form-id="policy-batch-delete-form">删除</button>
                </div>
            </div>

            <form id="policy-batch-delete-form"
                  th:action="@{/policies/batch-delete}"
                  method="post"
                  data-confirm-message="确认删除选中的政策文章吗？"></form>

            <table class="simple-table">
                <thead>
                <tr>
                    <th class="checkbox-cell"><input type="checkbox" aria-label="select all" data-select-all></th>
                    <th class="index-cell">序号</th>
                    <th>标题</th>
                    <th>发布单位</th>
                    <th>来源</th>
                    <th>发布时间</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item, itemStat : ${records}">
                    <td class="checkbox-cell"><input type="checkbox" aria-label="select row" data-row-select th:value="${item.id}"></td>
                    <td class="index-cell" th:text="${(currentPage - 1) * pageSize + itemStat.count}">1</td>
                    <td th:text="${item.title}">就业扶持政策</td>
                    <td th:text="${item.issuingOrganization}">海东团市委</td>
                    <td th:text="${item.policySource}">官网</td>
                    <td th:text="${item.publishTime}">2026-04-03T17:00</td>
                    <td th:text="${item.status == 1 ? '已发布' : '草稿'}">已发布</td>
                    <td class="table-actions">
                        <a data-drawer-link th:href="@{'/policies/' + ${item.id}}">详情</a>
                        <a data-drawer-link th:href="@{'/policies/' + ${item.id} + '/edit'}">编辑</a>
                        <form th:action="@{'/policies/' + ${item.id} + '/status'}" method="post">
                            <input type="hidden" name="status" th:value="${item.status == 1 ? 0 : 1}">
                            <button type="submit" class="link-button"
                                    th:text="${item.status == 1 ? '下线' : '发布'}">发布</button>
                        </form>
                        <form th:action="@{'/policies/' + ${item.id} + '/delete'}"
                              method="post"
                              data-confirm-message="确认删除这条政策文章吗？">
                            <button type="submit" class="link-button">删除</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(records)}">
                    <td class="empty-cell" colspan="8">暂无政策数据</td>
                </tr>
                </tbody>
            </table>

            <div class="pagination-bar" th:if="${totalCount > 0}">
                <div class="pagination-meta"
                     th:text="${'共 ' + totalCount + ' 条，当前第 ' + currentPage + ' / ' + totalPages + ' 页'}">共 0 条，当前第 1 / 1 页</div>
                <div class="pagination-tools">
                    <label class="pagination-page-size">
                        <span>每页</span>
                        <select name="pageSize" form="policy-list-form" data-page-size-select>
                            <option value="10" th:selected="${pageSize == 10}">10</option>
                            <option value="20" th:selected="${pageSize == 20}">20</option>
                            <option value="50" th:selected="${pageSize == 50}">50</option>
                            <option value="100" th:selected="${pageSize == 100}">100</option>
                        </select>
                        <span>条</span>
                    </label>
                    <div class="pagination-actions">
                        <button class="pagination-link" type="submit" form="policy-list-form" name="page"
                                th:value="${previousPage}" th:disabled="${!hasPrevious}">上一页</button>
                        <button class="pagination-link" type="submit" form="policy-list-form" name="page"
                                th:if="${showFirstPage}" th:value="${firstPage}" th:text="${firstPage}">1</button>
                        <span class="pagination-ellipsis" th:if="${showLeadingEllipsis}">...</span>
                        <button class="pagination-link"
                                th:classappend="${pageNumber == currentPage} ? ' active'"
                                th:each="pageNumber : ${pageNumbers}"
                                type="submit"
                                form="policy-list-form"
                                name="page"
                                th:value="${pageNumber}"
                                th:text="${pageNumber}"
                                th:disabled="${pageNumber == currentPage}">1</button>
                        <span class="pagination-ellipsis" th:if="${showTrailingEllipsis}">...</span>
                        <button class="pagination-link" type="submit" form="policy-list-form" name="page"
                                th:if="${showLastPage}" th:value="${lastPage}" th:text="${lastPage}">99</button>
                        <button class="pagination-link" type="submit" form="policy-list-form" name="page"
                                th:value="${nextPage}" th:disabled="${!hasNext}">下一页</button>
                    </div>
                </div>
            </div>
            </div>
        </section>
        <aside class="record-drawer" data-drawer-panel hidden>
            <div class="panel record-drawer-panel">
                <div data-drawer-content class="record-drawer-content"></div>
            </div>
        </aside>
        </div>
    </main>
</div>
<script th:src="@{/js/list-pagination.js}"></script>
<script th:src="@{/js/record-drawer.js}"></script>
</body>
</html>
