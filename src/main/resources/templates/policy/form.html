<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政策表单</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
</head>
<body class="admin-body">
<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content container-fluid">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle})}"></div>
        <section class="drawer-workspace">
            <section class="drawer-content-view" th:fragment="drawerContent">
                <div class="drawer-panel-header d-flex flex-wrap justify-content-between align-items-start gap-3">
                    <div>
                        <h2 class="h4 mb-1" th:text="${formTitle}">新增政策文章</h2>
                        <p class="text-secondary mb-0">填写政策基础信息和正文内容。</p>
                    </div>
                    <a class="btn btn-outline-secondary btn-sm" th:href="@{/policies}" data-drawer-close aria-label="关闭">
                        <i class="bi bi-x-lg" aria-hidden="true"></i>
                    </a>
                </div>
                <form th:action="@{${formAction}}" th:object="${policyForm}" method="post" class="edit-form row g-3" id="policy-form">
                    <label class="full-width col-12"><span>标题</span><input class="form-control" type="text" th:field="*{title}"></label>
                    <label class="col-12 col-md-6"><span>发布单位</span><input class="form-control" type="text" th:field="*{issuingOrganization}"></label>
                    <label class="col-12 col-md-6"><span>来源</span><input class="form-control" type="text" th:field="*{policySource}"></label>
                    <label class="full-width col-12"><span>摘要</span><textarea class="form-control" th:field="*{summary}"></textarea></label>
                    <label class="full-width col-12">
                        <span>正文</span>
                        <input type="hidden" th:field="*{contentHtml}" id="contentHtml">
                        <div id="policy-editor" class="rich-editor"></div>
                    </label>
                    <div class="form-actions full-width col-12">
                        <a class="btn btn-outline-secondary" th:href="@{/policies}" data-drawer-close>取消</a>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </section>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
<script>
    const quill = new Quill('#policy-editor', {
        theme: 'snow',
        placeholder: '请输入政策正文',
        modules: {
            toolbar: [
                [{ header: [1, 2, 3, false] }],
                ['bold', 'italic', 'underline'],
                [{ list: 'ordered' }, { list: 'bullet' }],
                ['link', 'blockquote'],
                ['clean']
            ]
        }
    });
    const hiddenInput = document.getElementById('contentHtml');
    quill.root.innerHTML = hiddenInput.value || '';
    document.getElementById('policy-form').addEventListener('submit', function () {
        hiddenInput.value = quill.root.innerHTML;
    });
</script>
</body>
</html>
