<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青年信息表单</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="admin-body">
<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle})}"></div>
        <section class="drawer-shell">
            <div class="drawer-placeholder">
                <div class="drawer-placeholder-copy">
                    <h2 th:text="${youthTypeLabel}">在校大学生</h2>
                    <p>当前页面保持原有保存流程不变，仅在视觉上调整为右侧编辑面板，便于与目标设计稿保持一致。</p>
                </div>
            </div>

            <section class="drawer-panel record-drawer-inner" th:fragment="drawerContent">
                <div class="panel-header">
                    <div class="drawer-panel-header">
                        <div>
                            <h2 th:text="${formTitle}">新增青年信息</h2>
                            <p th:text="${youthTypeLabel + '分类下的基础表单维护'}">青年基础表单维护</p>
                        </div>
                        <a class="drawer-close-link" th:href="@{'/youth/' + ${youthType}}" data-drawer-close>×</a>
                    </div>
                </div>

                <form th:action="@{${formAction}}" th:object="${youthForm}" method="post" class="edit-form">
                    <label><span>姓名</span><input type="text" th:field="*{name}"></label>
                    <label>
                        <span>性别</span>
                        <select th:field="*{gender}">
                            <option value="">请选择</option>
                            <option th:each="item : ${genders}" th:value="${item.dictValue}" th:text="${item.dictLabel}"></option>
                        </select>
                    </label>
                    <label><span>出生年月</span><input type="date" th:field="*{birthDate}"></label>
                    <label>
                        <span>民族</span>
                        <select th:field="*{ethnicity}">
                            <option value="">请选择</option>
                            <option th:each="item : ${ethnicities}" th:value="${item.dictValue}" th:text="${item.dictLabel}"></option>
                        </select>
                    </label>
                    <label>
                        <span>政治面貌</span>
                        <select th:field="*{politicalStatus}">
                            <option value="">请选择</option>
                            <option th:each="item : ${politicalStatuses}" th:value="${item.dictValue}" th:text="${item.dictLabel}"></option>
                        </select>
                    </label>
                    <div class="filter-block full-width" data-region-step data-region-api-url="/api/regions" data-region-placeholder="籍贯">
                        <input type="hidden" th:field="*{nativeProvinceCode}" data-region-province>
                        <input type="hidden" th:field="*{nativeCityCode}" data-region-city>
                        <input type="hidden" th:field="*{nativeCountyCode}" data-region-county>
                    </div>
                    <label>
                        <span>学历</span>
                        <select th:field="*{educationLevel}">
                            <option value="">请选择</option>
                            <option th:each="item : ${educationLevels}" th:value="${item.dictValue}" th:text="${item.dictLabel}"></option>
                        </select>
                    </label>
                    <label>
                        <span>学校</span>
                        <select th:field="*{schoolName}">
                            <option value="">请选择</option>
                            <option th:each="item : ${schools}"
                                    th:value="${item.schoolName}"
                                    th:text="${item.schoolName + ' / ' + item.categoryLabel}"></option>
                        </select>
                    </label>
                    <div class="filter-block full-width" data-region-step data-region-api-url="/api/regions" data-region-placeholder="学校所在地">
                        <input type="hidden" th:field="*{schoolProvinceCode}" data-region-province>
                        <input type="hidden" th:field="*{schoolCityCode}" data-region-city>
                        <input type="hidden" th:field="*{schoolCountyCode}" data-region-county>
                    </div>
                    <label>
                        <span>专业</span>
                        <select th:field="*{major}">
                            <option value="">请选择</option>
                            <option th:each="item : ${majors}"
                                    th:value="${item.majorName}"
                                    th:text="${item.majorName + ' / ' + item.categoryLabel}"
                                    th:attr="data-category-label=${item.categoryLabel}"></option>
                        </select>
                    </label>
                    <label><span>专业类别</span><input type="text" th:field="*{majorCategory}" readonly></label>
                    <label><span>毕业时间</span><input type="date" th:field="*{graduationDate}"></label>
                    <label><span>就业方向</span><input type="text" th:field="*{employmentDirection}"></label>
                    <label><span>联系方式</span><input type="text" th:field="*{phone}"></label>
                    <div class="filter-block full-width" data-region-step data-region-api-url="/api/regions" data-region-placeholder="现居住地">
                        <input type="hidden" th:field="*{residenceProvinceCode}" data-region-province>
                        <input type="hidden" th:field="*{residenceCityCode}" data-region-city>
                        <input type="hidden" th:field="*{residenceCountyCode}" data-region-county>
                    </div>
                    <label><span>就业状态</span><input type="text" th:field="*{employmentStatus}"></label>
                    <label><span>当前从事工作</span><input type="text" th:field="*{currentJob}"></label>
                    <label><span>就业单位</span><input type="text" th:field="*{employmentCompany}"></label>
                    <label><span>创业状态</span><input type="text" th:field="*{entrepreneurshipStatus}"></label>
                    <label><span>创业项目</span><input type="text" th:field="*{entrepreneurshipProject}"></label>
                    <label class="full-width"><span>创业需求</span><textarea th:field="*{entrepreneurshipDemand}"></textarea></label>
                    <label class="full-width"><span>备注</span><textarea th:field="*{remarks}"></textarea></label>

                    <div class="form-actions full-width">
                        <a class="ghost-button" th:href="@{'/youth/' + ${youthType}}" data-drawer-close>取消</a>
                        <button type="submit">保存</button>
                    </div>
                </form>
            </section>
        </section>
    </main>
</div>
<script th:src="@{/js/region-step-select.js}"></script>
<script>
    (() => {
        const majorSelect = document.querySelector('select[name="major"]');
        const majorCategoryInput = document.querySelector('input[name="majorCategory"]');
        if (!majorSelect || !majorCategoryInput) {
            return;
        }
        const syncMajorCategory = () => {
            const selectedOption = majorSelect.selectedOptions[0];
            majorCategoryInput.value = selectedOption ? (selectedOption.dataset.categoryLabel || "") : "";
        };
        majorSelect.addEventListener("change", syncMajorCategory);
        syncMajorCategory();
    })();
</script>
</body>
</html>
