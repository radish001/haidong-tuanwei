<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青年信息库</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body class="admin-body">
<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content container-fluid">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle})}"></div>

        <div data-drawer-page>
        <section class="card border-0 shadow-sm workbench-card">
            <div class="card-body">
            <div class="alert success-alert" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert success-alert" th:if="${importMessage}" th:text="${importMessage}"></div>

            <div class="ajax-list-shell" data-ajax-list-root th:fragment="listContent">
            <div class="workbench-toolbar">
                <form class="filter-form workbench-filter-form youth-filter-grid row g-3 bootstrap-filter-form" method="get" id="youth-list-form" data-ajax-form>
                    <input th:each="schoolCategoryId : ${query.schoolCategoryIds}"
                           type="hidden"
                           name="schoolCategoryIds"
                           th:value="${schoolCategoryId}">
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-3">
                        <label for="name">姓名:
                            <input class="form-control" id="name" type="text" name="name" th:value="${query.name}" placeholder="输入姓名">
                        </label>
                    </div>
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-3">
                        <label for="gender">性别:
                            <select class="form-select" id="gender" name="gender">
                                <option value="">全部性别</option>
                                <option th:each="item : ${genders}" th:value="${item.dictValue}" th:text="${item.dictLabel}"
                                        th:selected="${item.dictValue == query.gender}"></option>
                            </select>
                        </label>
                    </div>
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-3">
                        <label for="ethnicity">民族:
                            <select class="form-select" id="ethnicity" name="ethnicity">
                                <option value="">全部民族</option>
                                <option th:each="item : ${ethnicities}" th:value="${item.dictValue}" th:text="${item.dictLabel}"
                                        th:selected="${item.dictValue == query.ethnicity}"></option>
                            </select>
                        </label>
                    </div>
                    <div class="col-12 col-md-6 col-xl-4">
                        <div class="filter-block full-width">
                            <span>籍贯:</span>
                            <div data-region-step data-region-api-url="/api/regions" data-region-placeholder="籍贯">
                                <input type="hidden" name="nativeProvinceCode" th:value="${query.nativeProvinceCode}" data-region-province>
                                <input type="hidden" name="nativeCityCode" th:value="${query.nativeCityCode}" data-region-city>
                                <input type="hidden" name="nativeCountyCode" th:value="${query.nativeCountyCode}" data-region-county>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-3">
                        <label for="recruitmentYear">招考年份:
                            <input class="form-control" id="recruitmentYear" type="text" name="recruitmentYear"
                                   th:value="${query.recruitmentYear}" inputmode="numeric" maxlength="4" placeholder="输入招考年份">
                        </label>
                    </div>
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-3">
                        <label for="educationLevel">学历:
                            <select class="form-select" id="educationLevel" name="educationLevel">
                                <option value="">全部学历</option>
                                <option th:each="item : ${educationLevels}" th:value="${item.dictValue}" th:text="${item.dictLabel}"
                                        th:selected="${item.dictValue == query.educationLevel}"></option>
                            </select>
                        </label>
                    </div>
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-3">
                        <label for="schoolCode">学校:
                            <select class="form-select" id="schoolCode" name="schoolCode">
                                <option value="">全部院校</option>
                                <option th:each="item : ${schools}"
                                        th:value="${item.schoolCode}"
                                        th:text="${item.schoolName}"
                                        th:selected="${item.schoolCode == query.schoolCode}"></option>
                            </select>
                        </label>
                    </div>
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-3">
                        <label for="majorCategory">专业类别:
                            <select class="form-select" id="majorCategory" name="majorCategory">
                                <option value="">全部专业类别</option>
                                <option th:each="item : ${majorCategories}"
                                        th:value="${item.dictValue}"
                                        th:text="${item.dictLabel}"
                                        th:selected="${item.dictValue == query.majorCategory}"></option>
                            </select>
                        </label>
                    </div>
                    <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-3">
                        <label for="majorCode">专业:
                            <select class="form-select" id="majorCode" name="majorCode">
                                <option value="">全部专业</option>
                                <option th:each="item : ${majors}"
                                        th:value="${item.majorCode}"
                                        th:text="${item.majorName}"
                                        th:attr="data-category-dict-value=${item.categoryDictValue}"
                                        th:selected="${item.majorCode == query.majorCode}"></option>
                            </select>
                        </label>
                    </div>
                    <div class="col-12 col-md-6 col-xl-4">
                        <div class="filter-block full-width">
                            <span>学校所在区域:</span>
                            <div data-region-step data-region-api-url="/api/regions" data-region-placeholder="学校所在区域">
                                <input type="hidden" name="schoolProvinceCode" th:value="${query.schoolProvinceCode}" data-region-province>
                                <input type="hidden" name="schoolCityCode" th:value="${query.schoolCityCode}" data-region-city>
                                <input type="hidden" name="schoolCountyCode" th:value="${query.schoolCountyCode}" data-region-county>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 col-xl-4 d-flex align-items-end filter-actions-cell">
                        <div class="filter-actions-inline d-flex gap-2">
                            <a class="btn btn-outline-secondary" data-ajax-link th:href="@{/youth/college(pageSize=${pageSize})}">重置</a>
                            <button type="submit" class="btn btn-primary">查询</button>
                        </div>
                    </div>
                </form>

                <div class="alert alert-info py-2 px-3 mb-3"
                     th:if="${schoolCategoryFilterLabels != null and !#lists.isEmpty(schoolCategoryFilterLabels)}"
                     th:text="${'当前按院校层次筛选：' + #strings.listJoin(schoolCategoryFilterLabels, '、')}">
                    当前按院校层次筛选
                </div>

                <div class="workbench-actions">
                    <a class="btn btn-primary" data-drawer-link th:href="@{/youth/college/new}">新增</a>
                    <button type="button" class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#youthImportExportModal">导入导出</button>
                    <button type="button"
                            class="btn btn-outline-danger"
                            data-batch-delete-button
                            data-batch-form-id="youth-batch-delete-form">删除</button>
                </div>
            </div>

            <form id="youth-batch-delete-form"
                  th:action="@{/youth/college/batch-delete}"
                  method="post"
                  data-confirm-message="确认删除选中的青年信息吗？"></form>

            <div class="import-result" th:if="${importResult != null}">
                <h3>导入结果</h3>
                <p th:text="${'成功 ' + importResult.successCount + ' 条，失败 ' + importResult.failCount + ' 条'}"></p>
                <div class="mb-3" th:if="${!#lists.isEmpty(importResult.failedRows)}">
                    <a class="btn btn-outline-secondary"
                       th:href="@{/youth/{type}/import-failures(type=${youthType})}">
                        下载失败数据
                    </a>
                </div>
                <table class="simple-table table table-hover align-middle mb-0" th:if="${!#lists.isEmpty(importResult.errors)}">
                    <thead>
                    <tr>
                        <th>失败行号</th>
                        <th>失败原因</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="error : ${importResult.errors}">
                        <td th:text="${error.rowNumber}">2</td>
                        <td th:text="${error.message}">数据错误</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="table-responsive">
                <table class="simple-table table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th class="checkbox-cell"><input type="checkbox" aria-label="select all" data-select-all></th>
                        <th class="index-cell">序号</th>
                        <th>姓名</th>
                        <th>性别</th>
                        <th>出生年月</th>
                        <th>民族</th>
                        <th>籍贯</th>
                        <th>招考年份</th>
                        <th>就读院校</th>
                        <th>学历</th>
                        <th>专业</th>
                        <th>专业类别</th>
                        <th>学校所在区域</th>
                        <th>联系方式</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item, itemStat : ${records}">
                        <td class="checkbox-cell"><input type="checkbox" aria-label="select row" data-row-select th:value="${item.id}"></td>
                        <td class="index-cell" th:text="${(currentPage - 1) * pageSize + itemStat.count}">1</td>
                        <td th:text="${item.name}">姓名</td>
                        <td th:text="${item.gender}">男</td>
                        <td th:text="${item.birthDate}">2001-01-01</td>
                        <td th:text="${item.ethnicity}">汉族</td>
                        <td th:text="${item.nativePlaceName}">乐都区</td>
                        <td th:text="${item.recruitmentYear}">2023</td>
                        <td th:text="${item.schoolName}">青海大学</td>
                        <td th:text="${item.educationLevelName}">本科</td>
                        <td th:text="${item.major}">计算机科学与技术</td>
                        <td th:text="${item.majorCategory}">工学</td>
                        <td th:text="${item.schoolRegionName}">青海省-海东市</td>
                        <td th:text="${item.phone}">13900000001</td>
                        <td class="table-actions">
                            <a class="btn btn-sm btn-outline-info" data-drawer-link th:href="@{'/youth/college/' + ${item.id}}">详情</a>
                            <a class="btn btn-sm btn-outline-secondary" data-drawer-link th:href="@{'/youth/college/' + ${item.id} + '/edit'}">编辑</a>
                            <form th:action="@{'/youth/college/' + ${item.id} + '/delete'}"
                                  method="post"
                                  data-confirm-message="确认删除这条青年信息吗？">
                                <button type="submit" class="btn btn-sm btn-outline-danger">删除</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(records)}">
                        <td class="empty-cell" colspan="15">暂无在校大学生数据</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination-bar d-flex flex-wrap justify-content-between align-items-center" th:if="${totalCount > 0}">
                <div class="pagination-meta"
                     th:text="${'共 ' + totalCount + ' 条，当前第 ' + currentPage + ' / ' + totalPages + ' 页'}">共 0 条，当前第 1 / 1 页</div>
                <div class="pagination-tools d-flex align-items-center gap-3">
                    <label class="pagination-page-size d-inline-flex align-items-center gap-2 mb-0">
                        <span>每页</span>
                        <select class="form-select form-select-sm" name="pageSize" form="youth-list-form" data-page-size-select>
                            <option value="10" th:selected="${pageSize == 10}">10</option>
                            <option value="20" th:selected="${pageSize == 20}">20</option>
                            <option value="50" th:selected="${pageSize == 50}">50</option>
                            <option value="100" th:selected="${pageSize == 100}">100</option>
                        </select>
                        <span>条</span>
                    </label>
                    <nav aria-label="青年分页">
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item" th:classappend="${!hasPrevious} ? ' disabled'">
                                <button class="page-link" type="submit" form="youth-list-form" name="page"
                                        th:value="${previousPage}" th:disabled="${!hasPrevious}">上一页</button>
                            </li>
                            <li class="page-item" th:if="${showFirstPage}">
                                <button class="page-link" type="submit" form="youth-list-form" name="page"
                                        th:value="${firstPage}" th:text="${firstPage}">1</button>
                            </li>
                            <li class="page-item disabled" th:if="${showLeadingEllipsis}">
                                <span class="page-link">...</span>
                            </li>
                            <li class="page-item"
                                th:each="pageNumber : ${pageNumbers}"
                                th:classappend="${pageNumber == currentPage} ? ' active'">
                                <button class="page-link"
                                        type="submit"
                                        form="youth-list-form"
                                        name="page"
                                        th:value="${pageNumber}"
                                        th:text="${pageNumber}"
                                        th:disabled="${pageNumber == currentPage}">1</button>
                            </li>
                            <li class="page-item disabled" th:if="${showTrailingEllipsis}">
                                <span class="page-link">...</span>
                            </li>
                            <li class="page-item" th:if="${showLastPage}">
                                <button class="page-link" type="submit" form="youth-list-form" name="page"
                                        th:value="${lastPage}" th:text="${lastPage}">99</button>
                            </li>
                            <li class="page-item" th:classappend="${!hasNext} ? ' disabled'">
                                <button class="page-link" type="submit" form="youth-list-form" name="page"
                                        th:value="${nextPage}" th:disabled="${!hasNext}">下一页</button>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
            </div>
            </div>
        </section>
        <div class="offcanvas offcanvas-end record-drawer-canvas" tabindex="-1" data-drawer-offcanvas aria-labelledby="youth-drawer-title">
            <div class="offcanvas-header border-bottom">
                <h5 class="offcanvas-title" id="youth-drawer-title" data-drawer-title>详细信息</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="关闭"></button>
            </div>
            <div class="offcanvas-body" data-drawer-content></div>
        </div>
        </div>

        <div class="modal fade bootstrap-upload-modal" id="youthImportExportModal" tabindex="-1" aria-labelledby="youthImportExportModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <div>
                            <h3 class="modal-title" id="youthImportExportModalLabel">导入导出</h3>
                        </div>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="关闭"></button>
                    </div>

                    <div class="modal-body">
                        <div class="bootstrap-upload-actions d-flex flex-wrap gap-2 mb-3">
                            <button type="button"
                                    class="btn btn-outline-info"
                                    data-export-current-filters
                                    th:data-export-url="@{/youth/{type}/export(type=${youthType})}">
                                <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                                导出
                            </button>
                            <button type="button"
                                    class="btn btn-outline-secondary"
                                    data-template-download
                                    th:data-template-url="@{/youth/{type}/template(type=${youthType})}">
                                <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                                下载导入模板
                            </button>
                        </div>

                        <form class="import-dropzone-form" th:action="@{/youth/college/import}" method="post" enctype="multipart/form-data">
                            <label class="bootstrap-upload-dropzone" for="youth-import-file" data-dropzone>
                                <input id="youth-import-file" type="file" name="file" accept=".xlsx,.xls" hidden>
                                <strong>拖动 Excel 文件到此处</strong>
                                <span>或点击选择文件，支持 `.xlsx`、`.xls`，单文件不超过 <span th:text="${uploadMaxFileSizeText}">10MB</span></span>
                                <em data-file-name>未选择文件</em>
                            </label>
                            <div class="modal-footer px-0 pb-0">
                                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                                <button type="submit" class="btn btn-primary" data-import-submit>
                                    <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                                    上传文件
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/list-pagination.js}"></script>
<script th:src="@{/js/record-drawer.js}"></script>
<script th:src="@{/js/region-step-select.js}"></script>
<script th:src="@{/js/alert-banner.js}"></script>
<script>
    (() => {
        const modal = document.getElementById('youthImportExportModal');
        if (!modal) {
            return;
        }

        const fileInput = modal.querySelector('#youth-import-file');
        const dropzone = modal.querySelector('[data-dropzone]');
        const fileName = modal.querySelector('[data-file-name]');
        const exportButton = modal.querySelector('[data-export-current-filters]');
        const templateButton = modal.querySelector('[data-template-download]');
        const importForm = modal.querySelector('.import-dropzone-form');
        const importSubmit = modal.querySelector('[data-import-submit]');

        const setButtonLoading = (button, loading) => {
            if (!button) {
                return;
            }
            const spinner = button.querySelector('.spinner-border');
            if (spinner) {
                spinner.classList.toggle('d-none', !loading);
            }
            button.disabled = loading;
        };

        const downloadFile = async (button, url) => {
            setButtonLoading(button, true);
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error('Download failed: ' + response.status);
                }
                const disposition = response.headers.get('Content-Disposition') || '';
                let downloadName = 'download.xlsx';
                const utf8Match = disposition.match(/filename\*=UTF-8''(.+)/);
                if (utf8Match) {
                    downloadName = decodeURIComponent(utf8Match[1]);
                }
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const anchor = document.createElement('a');
                anchor.href = blobUrl;
                anchor.download = downloadName;
                document.body.appendChild(anchor);
                anchor.click();
                document.body.removeChild(anchor);
                URL.revokeObjectURL(blobUrl);
            } catch (error) {
                console.error('Download error:', error);
            } finally {
                setButtonLoading(button, false);
            }
        };

        const buildExportUrl = () => {
            const exportUrl = exportButton?.dataset.exportUrl;
            if (!exportUrl) {
                return null;
            }
            const url = new URL(exportUrl, window.location.origin);
            const filterForm = document.getElementById('youth-list-form');
            if (!filterForm) {
                return url.toString();
            }
            const formData = new FormData(filterForm);
            for (const [key, value] of formData.entries()) {
                if (key === 'page' || key === 'pageSize') {
                    continue;
                }
                const normalizedValue = typeof value === 'string' ? value.trim() : value;
                if (normalizedValue !== '') {
                    url.searchParams.append(key, normalizedValue);
                }
            }
            return url.toString();
        };

        const updateFileName = (file) => {
            fileName.textContent = file ? file.name : '未选择文件';
        };

        fileInput.addEventListener('change', () => {
            updateFileName(fileInput.files[0]);
        });

        exportButton?.addEventListener('click', () => {
            const targetUrl = buildExportUrl();
            if (!targetUrl) {
                return;
            }
            downloadFile(exportButton, targetUrl);
        });

        templateButton?.addEventListener('click', () => {
            const url = templateButton.dataset.templateUrl;
            if (!url) {
                return;
            }
            downloadFile(templateButton, url);
        });

        // 专业类别-专业级联逻辑
        const loadMajorsByCategory = async (categoryValue) => {
            try {
                const url = new URL('/api/majors/by-category-value', window.location.origin);
                if (categoryValue) {
                    url.searchParams.append('categoryDictValue', categoryValue);
                }
                const response = await fetch(url, {
                    headers: { "X-Requested-With": "XMLHttpRequest" }
                });
                if (!response.ok) {
                    throw new Error('Failed to load majors');
                }
                return await response.json();
            } catch (error) {
                console.error('Error loading majors:', error);
                return [];
            }
        };

        const initMajorCascade = async (container = document) => {
            const scope = container && typeof container.querySelector === 'function' ? container : document;
            const majorCategorySelect = scope.querySelector('#majorCategory');
            const majorCodeSelect = scope.querySelector('#majorCode');

            if (!majorCategorySelect || !majorCodeSelect) {
                return;
            }
            if (majorCategorySelect.dataset.cascadeInitialized === 'true') {
                return;
            }

            // 更新专业下拉框
            const updateMajorOptions = (majors) => {
                const currentValue = majorCodeSelect.value;
                majorCodeSelect.innerHTML = '<option value="">全部专业</option>';
                majors.forEach(major => {
                    const option = document.createElement('option');
                    option.value = major.majorCode;
                    option.text = major.majorName;
                    option.dataset.categoryDictValue = major.categoryDictValue || '';
                    majorCodeSelect.appendChild(option);
                });
                // 尝试恢复之前选中的值
                if (currentValue && Array.from(majorCodeSelect.options).some(opt => opt.value === currentValue)) {
                    majorCodeSelect.value = currentValue;
                }

                // 列表页启用了 TomSelect，除了更新原生 select，还要同步刷新可视化下拉实例。
                const majorTomSelect = majorCodeSelect.tomselect;
                if (majorTomSelect) {
                    majorTomSelect.clearOptions();
                    majorTomSelect.addOption(majors.map((major) => ({
                        value: major.majorCode,
                        text: major.majorName
                    })));
                    majorTomSelect.refreshOptions(false);
                    if (currentValue && majors.some((major) => major.majorCode === currentValue)) {
                        majorTomSelect.setValue(currentValue, true);
                    } else {
                        majorTomSelect.clear(true);
                    }
                }
            };

            // 专业类别变化时加载对应专业
            majorCategorySelect.addEventListener('change', async () => {
                const categoryValue = majorCategorySelect.value;
                const majors = await loadMajorsByCategory(categoryValue);
                updateMajorOptions(majors);
            });

            // 页面加载时根据已选专业类别初始化专业列表
            const initialCategoryValue = majorCategorySelect.value;
            if (initialCategoryValue) {
                const majors = await loadMajorsByCategory(initialCategoryValue);
                updateMajorOptions(majors);
            }

            majorCategorySelect.dataset.cascadeInitialized = 'true';
        };

        window.YouthListPage = window.YouthListPage || {};
        window.YouthListPage.initMajorCascade = initMajorCascade;

        // 在 DOM 加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                void initMajorCascade();
            });
        } else {
            void initMajorCascade();
        }

        importForm?.addEventListener('submit', () => {
            setButtonLoading(importSubmit, true);
        });

        modal.addEventListener('hidden.bs.modal', () => {
            updateFileName(fileInput.files[0]);
            dropzone.classList.remove('is-dragover');
            setButtonLoading(exportButton, false);
            setButtonLoading(templateButton, false);
            setButtonLoading(importSubmit, false);
        });

        ['dragenter', 'dragover'].forEach((eventName) => {
            dropzone.addEventListener(eventName, (event) => {
                event.preventDefault();
                dropzone.classList.add('is-dragover');
            });
        });

        ['dragleave', 'drop'].forEach((eventName) => {
            dropzone.addEventListener(eventName, (event) => {
                event.preventDefault();
                dropzone.classList.remove('is-dragover');
            });
        });

        dropzone.addEventListener('drop', (event) => {
            const files = event.dataTransfer.files;
            if (files && files.length) {
                fileInput.files = files;
                updateFileName(files[0]);
            }
        });
    })();
</script>
</body>
</html>
