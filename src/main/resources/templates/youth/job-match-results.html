<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生匹配招聘</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body class="admin-body">
<div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="content container-fluid">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle})}"></div>
        <section class="drawer-workspace">
            <section class="drawer-content-view match-results-drawer"
                     th:fragment="drawerContent"
                     th:attr="data-drawer-return-url=${sourceDetailUrl},data-drawer-return-title=${sourceDetailTitle}">
                <div class="drawer-panel-header">
                    <h2 class="h4 mb-1" th:text="${youthInfo.name + ' 匹配招聘信息'}">学生匹配招聘</h2>
                </div>
                <div class="detail-grid row g-3">
                    <div class="col-12 col-sm-6"><span>专业</span><strong th:text="${#strings.isEmpty(matchMajorLabel) ? '未参与匹配' : matchMajorLabel}">未参与匹配</strong></div>
                    <div class="col-12 col-sm-6"><span>学历</span><strong th:text="${#strings.isEmpty(matchEducationLabel) ? '未参与匹配' : matchEducationLabel}">未参与匹配</strong></div>
                    <div class="col-12 col-sm-6"><span>学校类别</span><strong th:text="${#strings.isEmpty(matchSchoolCategoryLabel) ? '未参与匹配' : matchSchoolCategoryLabel}">未参与匹配</strong></div>
                </div>

                <form class="pagination-bar d-flex flex-wrap justify-content-between align-items-center"
                      method="get"
                      th:action="@{'/youth/' + ${youthType} + '/' + ${youthInfo.id} + '/matches'}">
                    <div class="pagination-meta"
                         th:text="${'共匹配到 ' + totalCount + ' 个岗位，当前第 ' + currentPage + ' / ' + totalPages + ' 页'}">共匹配到 0 个岗位</div>
                    <div class="pagination-tools d-flex align-items-center gap-3" th:if="${totalCount > 0}">
                        <label class="pagination-page-size d-inline-flex align-items-center gap-2 mb-0">
                            <span>每页</span>
                            <select class="form-select form-select-sm" name="pageSize" data-page-size-select>
                                <option value="10" th:selected="${pageSize == 10}">10</option>
                                <option value="20" th:selected="${pageSize == 20}">20</option>
                                <option value="50" th:selected="${pageSize == 50}">50</option>
                                <option value="100" th:selected="${pageSize == 100}">100</option>
                            </select>
                            <span>条</span>
                        </label>
                        <nav aria-label="匹配结果分页">
                            <ul class="pagination pagination-sm mb-0">
                                <li class="page-item" th:classappend="${!hasPrevious} ? ' disabled'">
                                    <button class="page-link" type="submit" name="page"
                                            th:value="${previousPage}" th:disabled="${!hasPrevious}">上一页</button>
                                </li>
                                <li class="page-item" th:if="${showFirstPage}">
                                    <button class="page-link" type="submit" name="page"
                                            th:value="${firstPage}" th:text="${firstPage}">1</button>
                                </li>
                                <li class="page-item disabled" th:if="${showLeadingEllipsis}">
                                    <span class="page-link">...</span>
                                </li>
                                <li class="page-item"
                                    th:each="pageNumber : ${pageNumbers}"
                                    th:classappend="${pageNumber == currentPage} ? ' active'">
                                    <button class="page-link"
                                            type="submit"
                                            name="page"
                                            th:value="${pageNumber}"
                                            th:text="${pageNumber}"
                                            th:disabled="${pageNumber == currentPage}">1</button>
                                </li>
                                <li class="page-item disabled" th:if="${showTrailingEllipsis}">
                                    <span class="page-link">...</span>
                                </li>
                                <li class="page-item" th:if="${showLastPage}">
                                    <button class="page-link" type="submit" name="page"
                                            th:value="${lastPage}" th:text="${lastPage}">99</button>
                                </li>
                                <li class="page-item" th:classappend="${!hasNext} ? ' disabled'">
                                    <button class="page-link" type="submit" name="page"
                                            th:value="${nextPage}" th:disabled="${!hasNext}">下一页</button>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </form>

                <div class="match-results-table-shell table-responsive">
                    <table class="simple-table match-results-table table table-hover align-middle mb-0">
                        <thead>
                        <tr>
                            <th>岗位名称</th>
                            <th>所属企业</th>
                            <th>学历要求</th>
                            <th>专业要求</th>
                            <th>院校类别要求</th>
                            <th>工作地区</th>
                            <th>联系电话</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item, itemStat : ${records}">
                            <td th:text="${item.jobName}">岗位名称</td>
                            <td th:text="${item.enterpriseName}">所属企业</td>
                            <td th:text="${#strings.isEmpty(item.educationRequirement) ? '不限' : item.educationRequirement}">不限</td>
                            <td th:text="${#strings.isEmpty(item.majorRequirementSummary) ? '不限' : item.majorRequirementSummary}">不限</td>
                            <td th:text="${#strings.isEmpty(item.schoolCategorySummary) ? '未限制' : item.schoolCategorySummary}">未限制</td>
                            <td th:text="${item.workRegionName}">工作地区</td>
                            <td th:text="${item.contactPhone}">联系电话</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(records)}">
                            <td class="empty-cell" colspan="7">当前学生条件下暂无匹配招聘岗位</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="form-actions mt-3">
                    <a class="btn btn-outline-secondary"
                       data-drawer-close
                       th:href="${sourceDetailUrl}">返回详情</a>
                </div>
            </section>
        </section>
    </main>
</div>
<script th:src="@{/js/list-pagination.js}"></script>
<script th:src="@{/js/record-drawer.js}"></script>
</body>
</html>
