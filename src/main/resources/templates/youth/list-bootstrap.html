<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/bootstrap-layout :: head (青年信息库)}"></head>
<body data-bs-theme="dark" class="admin-body">
<div class="d-flex">
    <aside th:replace="~{fragments/bootstrap-sidebar :: sidebar}"></aside>

    <main class="main-content flex-grow-1">
        <div th:replace="~{fragments/bootstrap-topbar :: topbar}"></div>

        <div class="container-fluid py-4">
            <!-- 页面标题 -->
            <div class="page-hero mb-4">
                <h1 class="h3 mb-2">青年信息库</h1>
                <p class="text-secondary">管理海东市青年就业创业人才信息</p>
            </div>

            <!-- 筛选卡片 -->
            <div class="card mb-4">
                <div class="card-header">
                    <i class="bi bi-funnel me-2"></i>筛选查询
                </div>
                <div class="card-body">
                    <form method="get" id="filterForm">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label small text-secondary">姓名</label>
                                <input type="text" class="form-control" name="name" placeholder="输入姓名" th:value="${param.name}">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small text-secondary">性别</label>
                                <select class="form-select tomselect-basic" name="gender">
                                    <option value="">全部</option>
                                    <option th:each="g : ${genders}" th:value="${g.dictValue}" th:text="${g.dictLabel}"
                                            th:selected="${param.gender == g.dictValue}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small text-secondary">学历</label>
                                <select class="form-select tomselect-basic" name="educationLevel">
                                    <option value="">全部</option>
                                    <option th:each="e : ${educationLevels}" th:value="${e.dictValue}" th:text="${e.dictLabel}"
                                            th:selected="${param.educationLevel == e.dictValue}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small text-secondary">政治面貌</label>
                                <select class="form-select tomselect-basic" name="politicalStatus">
                                    <option value="">全部</option>
                                    <option th:each="p : ${politicalStatuses}" th:value="${p.dictValue}" th:text="${p.dictLabel}"
                                            th:selected="${param.politicalStatus == p.dictValue}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-secondary">现居住地</label>
                                <div data-region-cascader data-region-api-url="/api/regions" data-region-placeholder="筛选地区">
                                    <input type="hidden" name="residenceProvinceCode" data-region-province th:value="${param.residenceProvinceCode}">
                                    <input type="hidden" name="residenceCityCode" data-region-city th:value="${param.residenceCityCode}">
                                    <input type="hidden" name="residenceCountyCode" data-region-county th:value="${param.residenceCountyCode}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-secondary">学校</label>
                                <select class="form-select tomselect-searchable" name="schoolCode">
                                    <option value="">全部学校</option>
                                    <option th:each="s : ${schools}" th:value="${s.schoolCode}" th:text="${s.schoolName}"
                                            th:selected="${param.schoolCode == s.schoolCode}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="d-flex justify-content-end gap-2 mt-3">
                            <button type="reset" class="btn btn-sm btn-outline-secondary" onclick="window.location.href='/youth/college'">
                                <i class="bi bi-arrow-clockwise me-1"></i>重置
                            </button>
                            <button type="submit" class="btn btn-sm btn-primary">
                                <i class="bi bi-search me-1"></i>查询
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 操作栏 -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="d-flex gap-2">
                    <span class="badge bg-primary" th:if="${totalCount != null}" th:text="'共 ' + ${totalCount} + ' 条'">共 0 条</span>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/youth/import}" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-upload me-1"></i>导入
                    </a>
                    <a th:href="@{/youth/export}" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-download me-1"></i>导出
                    </a>
                    <a th:href="@{/youth/create}" class="btn btn-sm btn-primary">
                        <i class="bi bi-plus-lg me-1"></i>新增
                    </a>
                </div>
            </div>

            <!-- 数据表格 -->
            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th style="width: 60px;">序号</th>
                                    <th>姓名</th>
                                    <th>性别</th>
                                    <th>学历</th>
                                    <th>学校</th>
                                    <th>专业</th>
                                    <th>联系方式</th>
                                    <th>现居住地</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item, iter : ${list}">
                                    <td class="text-secondary" th:text="${iter.count + (pageNum - 1) * pageSize}">1</td>
                                    <td>
                                        <a th:href="@{/youth/{id}(id=${item.id})}" class="text-decoration-none text-brand fw-medium"
                                           th:text="${item.name}">姓名</a>
                                    </td>
                                    <td th:text="${item.genderLabel}">性别</td>
                                    <td th:text="${item.educationLevelLabel}">学历</td>
                                    <td th:text="${item.schoolName}">学校</td>
                                    <td th:text="${item.majorName}">专业</td>
                                    <td th:text="${item.phone}">电话</td>
                                    <td>
                                        <span class="small" th:if="${item.residenceProvinceName}" th:text="${item.residenceProvinceName}"></span>
                                        <span class="small" th:if="${item.residenceCityName}" th:text="'/' + ${item.residenceCityName}"></span>
                                        <span class="small" th:if="${item.residenceCountyName}" th:text="'/' + ${item.residenceCountyName}"></span>
                                    </td>
                                    <td>
                                        <div class="d-flex gap-1">
                                            <a th:href="@{/youth/{id}(id=${item.id})}" class="btn btn-sm btn-outline-primary" title="查看">
                                                <i class="bi bi-eye"></i>
                                            </a>
                                            <a th:href="@{/youth/{id}/edit(id=${item.id})}" class="btn btn-sm btn-outline-secondary" title="编辑">
                                                <i class="bi bi-pencil"></i>
                                            </a>
                                            <button type="button" class="btn btn-sm btn-outline-danger" title="删除"
                                                    onclick="confirmDelete(this)" th:data-id="${item.id}" th:data-name="${item.name}">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(list)}">
                                    <td colspan="9" class="text-center py-5 text-secondary">
                                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                        暂无数据
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 分页 -->
                <div class="card-footer" th:if="${pages != null && pages > 1}">
                    <nav aria-label="Page navigation">
                        <ul class="pagination justify-content-center mb-0">
                            <!-- 上一页 -->
                            <li class="page-item" th:classappend="${pageNum == 1} ? 'disabled' : ''">
                                <a class="page-link" th:href="@{/youth/college(pageNum=${pageNum - 1}, pageSize=${pageSize}, name=${param.name}, gender=${param.gender}, educationLevel=${param.educationLevel})}">
                                    <i class="bi bi-chevron-left"></i>
                                </a>
                            </li>

                            <!-- 页码 -->
                            <li class="page-item" th:each="i : ${#numbers.sequence(1, pages)}"
                                th:classappend="${i == pageNum} ? 'active' : ''">
                                <a class="page-link" th:href="@{/youth/college(pageNum=${i}, pageSize=${pageSize}, name=${param.name}, gender=${param.gender}, educationLevel=${param.educationLevel})}"
                                   th:text="${i}">1</a>
                            </li>

                            <!-- 下一页 -->
                            <li class="page-item" th:classappend="${pageNum == pages} ? 'disabled' : ''">
                                <a class="page-link" th:href="@{/youth/college(pageNum=${pageNum + 1}, pageSize=${pageSize}, name=${param.name}, gender=${param.gender}, educationLevel=${param.educationLevel})}">
                                    <i class="bi bi-chevron-right"></i>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

<!-- Tom Select JS -->
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<!-- 级联选择器 -->
<script th:src="@{/js/region-cascader-tomselect.js}"></script>

<script>
    // 初始化下拉框
    document.querySelectorAll('.tomselect-basic').forEach(select => {
        new TomSelect(select, {
            placeholder: '全部',
            allowEmptyOption: true,
            maxItems: 1
        });
    });

    document.querySelectorAll('.tomselect-searchable').forEach(select => {
        new TomSelect(select, {
            placeholder: '搜索...',
            allowEmptyOption: true,
            maxItems: 1,
            plugins: ['dropdown_input']
        });
    });

    // 删除确认
    function confirmDelete(button) {
        const id = button.dataset.id;
        const name = button.dataset.name;
        if (confirm(`确定要删除 "${name}" 的信息吗？\n此操作不可撤销。`)) {
            // 执行删除
            fetch(`/youth/${id}`, { method: 'DELETE' })
                .then(response => {
                    if (response.ok) {
                        window.location.reload();
                    } else {
                        alert('删除失败，请稍后重试');
                    }
                })
                .catch(() => alert('删除失败，请检查网络'));
        }
    }
</script>
</body>
</html>
