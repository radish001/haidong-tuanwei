spring.application.name=haidong-tuanwei
server.port=8080

app.upload.max-file-size=10MB
app.upload.max-request-size=12MB
app.upload.enterprise-license-dir=uploads/enterprise-license
spring.servlet.multipart.max-file-size=${app.upload.max-file-size}
spring.servlet.multipart.max-request-size=${app.upload.max-request-size}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:haidong_tuanwei}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=${DB_POOL_NAME:haidongHikariPool}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:300000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_TIME_MS:0}

app.logging.path=${LOG_PATH:logs}
app.logging.file-name=${LOG_FILE_NAME:${spring.application.name}}
app.logging.max-file-size=${LOG_MAX_FILE_SIZE:100MB}
app.logging.max-history=${LOG_MAX_HISTORY:12}
app.logging.total-size-cap=${LOG_TOTAL_SIZE_CAP:2GB}
app.logging.root-level=${ROOT_LOG_LEVEL:INFO}
app.logging.sql-level=${SQL_LOG_LEVEL:INFO}
app.logging.async-queue-size=${LOG_ASYNC_QUEUE_SIZE:8192}

spring.thymeleaf.cache=false
spring.mvc.hiddenmethod.filter.enabled=true
spring.web.resources.cache.period=0

mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=com.haidong.tuanwei
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

spring.sql.init.mode=never



server.servlet.session.timeout=8h
