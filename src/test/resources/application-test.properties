spring.application.name=haidong-tuanwei
server.port=0

app.upload.max-file-size=10MB
app.upload.max-request-size=12MB
spring.servlet.multipart.max-file-size=${app.upload.max-file-size}
spring.servlet.multipart.max-request-size=${app.upload.max-request-size}

spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.thymeleaf.cache=false
spring.mvc.hiddenmethod.filter.enabled=true
spring.web.resources.cache.period=0

mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=com.haidong.tuanwei
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql
spring.sql.init.data-locations=classpath:data-test.sql
spring.sql.init.continue-on-error=false

server.servlet.session.timeout=8h
